administration:
  steps:
    - title: Preparation
      body: >-
        Typically supplied as capsules or sublingual tablets. No reconstitution required. Store in
        cool, dry place away from light.
      cite: []
    - title: Oral route
      body: >-
        Swallow capsule with water, 20–30 minutes before meals or as directed. Traditional Khavinson
        protocol emphasizes empty stomach for absorption.
      cite: []
    - title: Sublingual route
      body: >-
        Place tablet under tongue, allow dissolution for 1–2 minutes. Avoid swallowing immediately.
        Claimed to bypass first-pass metabolism.
      cite: []
    - title: Timing
      body: >-
        Morning dose preferred; may split into twice-daily if higher dose used. Consistency
        emphasized in bioregulator protocols.
      cite: []
    - title: Cycle protocol
      body: >-
        10–30 day cycles common in Russian tradition. Rest period of 1–3 months between cycles often
        recommended, though no published evidence for this approach.
      cite: []
description_md: >-
  ## Research Context


  Chonluten belongs to the Khavinson bioregulator family—a class of short peptides developed at the
  Saint Petersburg Institute of Bioregulation and Gerontology. These peptides are hypothesized to
  exert tissue-specific regulatory effects via direct interaction with cellular machinery, though
  precise receptor targets remain undefined.


  ## Mechanistic Evidence


  The sole PubMed-indexed study (Avolio et al., 2022) evaluated Chonluten alongside four other
  Khavinson peptides in the THP-1 monocyte/macrophage cell line—a standard in vitro model for
  inflammatory response. The study documented modulation of proliferative activity and inflammatory
  pathways, providing preliminary mechanistic insight. However, the leap from monocyte cell culture
  to bronchial epithelial function in vivo is substantial and unsupported by published data.


  ## Evidence Gap


  No animal pharmacokinetics, respiratory inflammation models, or human trials appear in Western
  medical literature. The bronchial mucosa targeting claim derives from the Khavinson tissue-source
  hypothesis: peptides extracted from specific organs theoretically "home" to homologous tissues.
  This framework lacks validation by contemporary peptide pharmacology standards.


  ## Geographic Context


  Widely available in Russia and parts of Eastern Europe as a nutraceutical supplement. Not
  FDA-reviewed. Western research institutions have not independently replicated Khavinson peptide
  findings at scale.
