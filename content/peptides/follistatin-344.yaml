administration:
  steps:
    - title: Regulatory status
      body: >-
        Follistatin-344 is not approved for human administration. All cited studies measure
        endogenous serum follistatin as a biomarker, not as an exogenous therapeutic agent.
      cite: []
    - title: Endogenous modulation
      body: >-
        Resistance exercise combined with essential amino acid (EAA) supplementation elevated the
        follistatin/myostatin ratio by 15–25% in 12-week randomized trials. Protein intake (1.2–1.5
        g/kg/day) synergizes with training to upregulate endogenous follistatin.
      cite: []
    - title: Measurement context
      body: >-
        Serum follistatin and follistatin/myostatin ratio are used diagnostically in sarcopenia
        screening and as biomarkers of muscle anabolic balance in clinical trials.
      cite: []
    - title: Research consideration
      body: >-
        Gene therapy and recombinant follistatin delivery are under preclinical investigation for
        muscular dystrophy and sarcopenia. No human safety or efficacy data for exogenous FST-344
        administration.
      cite: []
synergy:
  stacks:
    - partner_slug: bpc-157
      partner_label: BPC-157
      synergy: multi-pathway
      rationale: >-
        Follistatin-344 (myostatin antagonist) and BPC-157 (tissue repair peptide) address
        complementary pathways in muscle recovery. FST-344 promotes muscle protein synthesis by
        disinhibiting myostatin signaling, while BPC-157 accelerates healing of tendons, ligaments,
        and microtears via angiogenesis and collagen synthesis. Combined, they may support both
        hypertrophy and structural repair during high-volume training or injury recovery.
      protocol:
        Follistatin-344: No approved protocol — endogenous modulation via resistance exercise + EAA
        BPC-157: 250–500 mcg SQ · twice daily · near injury site or systemic
        Duration: 4–8 weeks
      primary_benefit: Muscle hypertrophy + accelerated soft tissue repair
      cite: []
    - partner_slug: tb-500
      partner_label: TB-500
      synergy: moderate
      rationale: >-
        TB-500 (thymosin beta-4 fragment) promotes cell migration, angiogenesis, and
        anti-inflammatory signaling in muscle and connective tissue. Follistatin-344's anabolic
        signaling may synergize with TB-500's regenerative effects during muscle damage or
        overtraining, particularly in older adults where both myostatin inhibition and tissue repair
        are rate-limiting.
      protocol:
        Follistatin-344: Endogenous upregulation (resistance training + protein)
        TB-500: 2–5 mg SQ · twice weekly · loading phase 4 weeks, then maintenance
        Frequency: Twice weekly TB-500, daily training stimulus for FST
      primary_benefit: Enhanced recovery, reduced inflammation, muscle growth support
      cite: []
description_md: >-
  Follistatin-344 is the 344-amino-acid circulating isoform of follistatin, an endogenous antagonist
  of myostatin (GDF-8) and activin A. Unlike the longer FST-315 isoform, which contains a
  heparin-binding domain and remains tissue-sequestered, FST-344 circulates systemically and is used
  as a biomarker of anabolic balance in sarcopenia and muscle-wasting research.


  ## Mechanism


  Myostatin is a potent negative regulator of skeletal muscle growth. Follistatin binds myostatin
  with high affinity, preventing its engagement with the activin type IIB receptor (ActRIIB) on
  muscle cells. This disinhibits the downstream Smad2/3 signaling pathway, relieving the brake on
  muscle protein synthesis. The follistatin/myostatin (FST/MSTN) ratio is increasingly used as a
  prognostic marker in sarcopenia, with higher ratios associated with preserved muscle mass and
  function.


  ## Evidence Base


  **Human studies measure endogenous follistatin, not exogenous administration.** A 12-week
  randomized controlled trial in older women (n=96) demonstrated that resistance exercise combined
  with essential amino acid supplementation elevated the FST/MSTN ratio by 15–25% and improved
  muscle fitness outcomes. Diagnostic studies in compensated cirrhosis (n=116) and vitamin D
  deficiency screening (n=80) have validated serum follistatin as a biomarker correlating with
  muscle mass and physical function.


  **No clinical trials have administered exogenous follistatin-344 to humans.** Gene therapy
  approaches and recombinant follistatin delivery remain in preclinical phases. Systematic reviews
  of myostatin inhibitors identify follistatin as a promising indirect modulator but note the
  absence of Phase 1 safety data for direct administration.


  ## Regulatory Status


  Follistatin-344 is not approved by any regulatory authority for human use. It is measured as an
  endogenous biomarker in research settings. Recombinant follistatin and gene therapy constructs are
  under investigation for muscular dystrophy and age-related sarcopenia but have not progressed to
  human trials for athletic or cosmetic applications.


  ## Practical Context


  Endogenous follistatin can be upregulated through resistance training and adequate protein intake
  (1.2–1.5 g/kg/day). This physiological approach has demonstrated efficacy in improving the
  FST/MSTN ratio without exogenous peptide administration. Exogenous follistatin-344 remains a
  research molecule with unknown safety, pharmacokinetics, and efficacy profiles in humans.
