    Four-amino-acid bioregulatory peptide (Lys-Glu-Asp-Trp) developed by the St. Petersburg
    Institute of Bioregulation and Gerontology. Demonstrated restoration of glucose tolerance and
    pancreatic endocrine function in aged non-human primates. Stimulates expression of pancreatic
    differentiation factors (Pdx1, Pax6, Ptf1a) in both acinar and islet cells during cellular
    senescence. Russian-tradition peptide bioregulator with tissue-specific pancreoprotective
    activity.
