administration:
  steps:
    - title: Form
      body: "Pre-formulated nasal spray (commercial) or research vial reconstituted with bacteriostatic water."
    - title: Administration
      body: "Intranasal — 1–3 sprays per nostril per dose. Tilt head slightly back."
    - title: Timing
      body: "Morning + early afternoon for cognitive demand; PRN for acute anxiety."
    - title: Storage
      body: "Refrigerate after reconstitution; ≤30 days. Light-protected."
    - title: Caveat
      body: "Avoid co-administration with strong sedatives or other anxiolytics initially."

