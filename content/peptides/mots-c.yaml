schema_version: 1
slug: mots-c
name: MOTS-c
peptide_class: Mitochondrial-derived peptide
classification: Mitokine · Mitochondria-Encoded
categories: [mitochondrial, mitokine, ampk, exercise-mimetic, longevity]
aliases: ["mitochondrial open reading frame of the 12S rRNA-c", "MOTSc"]
color: green
evidence_level: animal-strong
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidedb-core]

summary: >-
  16-amino-acid mitochondrial-encoded peptide (mitokine) translated from the 12S
  rRNA short open reading frame. Activates AMPK via folate-cycle inhibition,
  increasing fatty acid oxidation, glucose tolerance, and mitochondrial biogenesis.
  Endogenous levels decline with age and rise with exercise — frequently described
  as an exercise-mimetic. No completed human RCT to date; first MOTS-c-analog
  Phase 1a/1b (CB4211) completed 2021.

