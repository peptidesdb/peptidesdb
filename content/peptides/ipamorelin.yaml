# =========================================================
# Ipamorelin — selective GH-releasing peptide
# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: ipamorelin
name: Ipamorelin
peptide_class: GHRP / Ghrelin Receptor Agonist
classification: Selective GHRP · Ghrelin Mimetic
categories: [gh-axis, ghrp, ghrelin, selective]
aliases: [NNC 26-0161]
color: purple
evidence_level: phase-1
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Pentapeptide growth-hormone-releasing peptide (GHRP) that selectively
  activates the ghrelin receptor (GHS-R1a) on the anterior pituitary, eliciting
  GH release without the cortisol or prolactin elevation characteristic of
  earlier GHRPs. Originally characterised by Raun et al. (1998); preferred
  GHRP partner for GHRH analogues like tesamorelin and CJC-1295.

