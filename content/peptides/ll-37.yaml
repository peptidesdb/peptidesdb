summary:
  value: >-
    Human cathelicidin-derived 37-amino-acid antimicrobial peptide, the sole cathelicidin in humans.
    Cleaved from hCAP-18 precursor at sites of inflammation. Exhibits broad-spectrum antimicrobial
    activity via membrane disruption and immunomodulatory functions including cytokine modulation,
    autophagy induction, and chemotaxis. Active against bacteria, fungi, parasites; implicated in
    wound healing, cancer, and systemic inflammation networks.
