administration:
  steps:
    - title: Reconstitution
      body: "Add 1–2 mL bacteriostatic water to a 50 mg vial → 25–50 mg/mL. Use within 30 days, refrigerated."
    - title: Injection site
      body: "SQ — local to the area of interest (face, scalp) for skin / hair indications. Rotate sites."
    - title: Timing
      body: "Anytime; evening preferred. Topical: apply to clean dry skin."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate, light-protected, ≤30 days."
    - title: Needle
      body: "30–31G, short (4–6 mm) for shallow SQ. Topical: clean fingertips, no needle."

synergy:
  stacks:
    - partner_slug: bpc-157
      partner_label: BPC-157
      synergy: moderate
      rationale: >-
        GHK-Cu drives ECM remodelling and copper-dependent enzymes; BPC-157
        upregulates VEGFR2 angiogenesis and fibroblast migration. The pathways
        are non-overlapping and complementary — together they accelerate wound
        healing more than either alone in anecdotal protocols.
      protocol:
        GHK-Cu: "1–2 mg SQ · daily near wound"
        BPC-157: "250–500 mcg SQ · daily near wound"
      primary_benefit: "Combined ECM rebuilding + angiogenesis for tissue repair"
