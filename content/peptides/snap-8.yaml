summary:
  value: >-
    Synthetic 8-amino-acid peptide derived from the N-terminal region of SNAP-25, a component of the
    neuronal SNARE complex. Inhibits SNARE-mediated vesicular neurotransmitter release at the
    neuromuscular junction when applied topically, reducing muscle contraction intensity and facial
    wrinkle depth. Marketed as a non-injectable alternative to botulinum toxin for cosmetic
    anti-aging applications.
