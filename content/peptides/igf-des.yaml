administration:
  steps:
    - title: Research context only
      body: >-
        Des(1-3)IGF-1 has no approved human protocol. All administration details are derived from
        animal or in vitro research and should not be construed as medical guidance.
      cite: []
    - title: Reconstitution (if lyophilized)
      body: >-
        Sterile water or bacteriostatic water per research protocol. Gently swirl; do not shake.
        Store reconstituted peptide at 2–8 °C.
      cite: []
    - title: Injection site
      body: >-
        Subcutaneous (abdomen, thigh) or intramuscular (deltoid, vastus lateralis). Local injection
        to target tissue (e.g., muscle group) may enhance regional uptake.
      cite: []
    - title: Timing
      body: >-
        Frequency and timing vary by research design. Post-exercise or fasted state may
        theoretically enhance muscle uptake.
      cite: []
    - title: Needle gauge
      body: 27–31G insulin syringe for subcutaneous; 25–27G for intramuscular.
      cite: []
    - title: Monitoring
      body: >-
        Glucose monitoring essential (hypoglycemia risk). No established IGF-1 or safety labs for
        human use.
      cite: []
