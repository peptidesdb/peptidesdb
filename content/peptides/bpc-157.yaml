summary: >-
  Synthetic 15-amino-acid pentadecapeptide derived from a protective sequence
  found in human gastric juice (BPC = Body Protection Compound). Stable in
  simulated gastric conditions and the most extensively studied healing peptide
  in animal literature. Demonstrates tendon, ligament, muscle, and
  gastrointestinal mucosa healing across 20+ rodent models. Clinically
  evaluated under designation PL-14736 in a Phase 2 ulcerative colitis trial.

