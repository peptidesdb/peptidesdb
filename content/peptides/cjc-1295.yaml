administration:
  steps:
    - title: Reconstitution
      body: "Add 2 mL bacteriostatic water to 2 mg vial → 1 mg/mL = 100 mcg per 0.1 mL. Roll gently."
    - title: Injection site
      body: "Subcutaneous, abdomen or thigh. Rotate sites."
    - title: Timing
      body: "Pre-sleep preferred. Often combined with ipamorelin in the same syringe."
    - title: Storage
      body: "Lyophilised: room temp, protected from light. Reconstituted: refrigerate 2–8 °C, use within 30 days."
    - title: Needle
      body: "29–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: strong
      rationale: >-
        CJC-1295 (no DAC) and ipamorelin are the canonical "GHRH + GHRP"
        dual-axis stack at physiological timing. Both peak within 30 min
        and clear within 2 hours, producing a sharp, high-amplitude GH
        pulse closely resembling natural physiology. Preferred over the
        CJC-1295-DAC + ipamorelin stack when pulsatility (vs sustained
        elevation) is the goal.
      protocol:
        "CJC-1295 (no DAC)": "100 mcg SQ · pre-sleep"
        Ipamorelin: "200–300 mcg SQ · same injection"
      primary_benefit: "Pulsatile GH stimulation, recovery, body composition"
      cite: [teichman-2006, raun-1998]
