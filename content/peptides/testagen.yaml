summary:
  value: >-
    Short tetrapeptide (Lys-Glu-Asp-Gly) from the Khavinson bioregulator tradition, proposed as a
    testicular tissue-specific regulator. Animal models suggest support for testicular function and
    spermatogenesis. Penetrates cell nuclei and demonstrates specific interaction with DNA and
    oligonucleotides in vitro, consistent with the bioregulator framework of peptide-mediated gene
    expression modulation. Evidence remains limited to mechanistic and animal studies; no human
    clinical trials or regulatory approval.
