summary:
  value: >-
    Dual GLP-1/glucagon receptor agonist developed by Boehringer Ingelheim and Zealand Pharma,
    currently in Phase 3 trials (SYNCHRONIZE program) for obesity and metabolic
    dysfunction-associated steatohepatitis (MASH). Phase 2 data demonstrated significant weight loss
    through reduced energy intake and increased energy expenditure. Acts centrally via
    circumventricular organs and peripherally on hepatic and pancreatic receptors. Once-weekly
    subcutaneous administration.
  cite:
    - yathindra-2026
    - rubino-2026
    - zimmermann-2026
