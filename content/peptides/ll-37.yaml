description_md: >-
  LL-37 is the sole human cathelicidin antimicrobial peptide, cleaved from the hCAP-18 precursor
  protein by proteinase-3. It serves as a first-line defense molecule in innate immunity, exhibiting
  direct antimicrobial activity against bacteria, fungi, and parasites, while simultaneously
  modulating host immune responses.


  **Antimicrobial Mechanisms**


  LL-37 disrupts pathogen membranes through amphipathic alpha-helix insertion, increasing
  permeability and causing cell lysis. It selectively targets infected or damaged host cells by
  binding externalized phosphatidylserine and inducing cholesterol depletion, as demonstrated in
  Plasmodium-infected erythrocytes. Short synthetic derivatives (e.g., SAMP-12aa) retain pepsin
  resistance and antimicrobial potency while reducing cytotoxicity.


  **Immunomodulatory Roles**


  Beyond direct killing, LL-37 enhances phagosome-lysosome fusion, induces autophagy, and modulates
  cytokine production. In sepsis and severe COVID-19, it co-expresses with alpha-defensins in
  coordinated innate immune networks. In acute pancreatitis, it associates with S100A8/S100A9 via
  distinct metabolic pathways, illustrating context-dependent immunoregulation.


  **Pathogen Specificity**


  LL-37 demonstrates activity against drug-resistant Mycobacterium tuberculosis, Plasmodium spp.
  (malaria), Helicobacter pylori, Pseudomonas aeruginosa, and Acanthamoeba castellanii. Hybrid
  peptides combining LL-37 fragments with other AMPs (e.g., Musca domestica AFP-1) show enhanced
  efficacy and reduced toxicity.


  **Biofilm and Oral Health**


  LL-37 forms stable complexes with bacterial DNA in dental plaque, influencing biofilm structure
  and periodontal pathogenesis. These complexes may paradoxically stabilize biofilms while also
  sequestering immunostimulatory bacterial DNA.


  **Clinical Context**


  Plasma LL-37 levels rise during malaria and other infections. Exogenous administration in mice
  reduced parasitemia, improved survival, and modulated pro-inflammatory cytokines. No FDA-approved
  therapeutic formulation exists; all clinical data derive from endogenous expression studies or
  experimental models.


  **Research Frontiers**


  Current investigations focus on LL-37 derivatives for antibiotic-resistant infections, cancer
  immunotherapy (tumor microenvironment modulation), and wound healing applications.
  Structure-activity relationship studies aim to optimize antimicrobial potency while minimizing
  host cytotoxicity.
