# TB-500 / Thymosin β4
# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: tb-500
name: TB-500
peptide_class: Actin-sequestering peptide
classification: Thymosin β4 fragment · Healing
categories: [healing, cardiovascular, hair, wound-healing]
aliases: ["Thymosin Beta-4", "TB4", "Tβ4", "thymosin β4"]
color: teal
evidence_level: phase-2
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Synthetic 17-amino-acid fragment of human thymosin β4 (TMSB4X), itself a
  43-residue actin-sequestering protein abundant in platelets, white blood
  cells, and many other tissues. Promotes endothelial cell migration, blood
  vessel development, and accelerated wound re-epithelialization across animal
  models and Phase 2 trials. Often paired with BPC-157 for tendon / ligament
  / muscle repair.

