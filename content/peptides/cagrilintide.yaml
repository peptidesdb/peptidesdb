summary:
  value: >-
    Long-acting amylin receptor agonist studied in combination with semaglutide (CagriSema) for
    obesity and type 2 diabetes. Acts centrally to induce satiety, suppress prandial glucagon, and
    reduce food intake. Phase 3 trials show 7.5% greater weight loss versus semaglutide monotherapy.
    Demonstrates dual AMYR/calcitonin-receptor agonism with extended half-life enabling once-weekly
    subcutaneous dosing.
  cite:
    - yamauchi-2026
    - ahmed-2026
    - bailey-2026
