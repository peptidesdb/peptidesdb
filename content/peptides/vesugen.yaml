description_md: >-
  ## Background


  Vesugen is a synthetic tripeptide (Lys-Glu-Asp, abbreviated KED) developed within the Khavinson
  school of bioregulatory peptides in Russia. It is part of a class of short peptides (typically 2–4
  amino acids) proposed to act as tissue-specific modulators via epigenetic mechanisms —
  specifically, direct interaction with gene promoters in target cell nuclei. Vesugen's designated
  target is the vascular endothelium.


  ## Research Context


  Animal and in vitro studies demonstrate that KED normalises endothelin-1 expression (elevated in
  atherosclerotic and restenotic vessels) and restores connexin-mediated intercellular communication
  in diseased endothelium. In aged endothelial cell cultures from old animals, Vesugen stimulates
  Ki-67 expression, a marker of proliferative capacity that declines with aging. Molecular docking
  models suggest the peptide binds to a core promoter sequence of the MKI67 gene (encoding Ki-67),
  specifically the motif 5'-CATC-3' located from -14 to +12 base pairs relative to transcription
  start.


  Clinical evidence is limited to Russian-language case series in elderly patients with lower-limb
  arterial insufficiency and vasculogenic erectile dysfunction, attributed to atherosclerosis. One
  report (Kitachev et al., 2014) describes improved penile artery blood flow following "Vezugen"
  (alternate transliteration) monotherapy, though methodological details and sample sizes are sparse
  in available abstracts.


  ## Mechanistic Hypothesis


  Unlike classical peptide hormones, Khavinson bioregulatory peptides are proposed to operate via
  **epigenetic gene regulation**: the tripeptide enters the nucleus and binds promoter DNA,
  modulating transcription. For Vesugen, this mechanism targets genes controlling endothelial
  proliferation and function. The model contrasts with receptor-mediated signaling and remains
  controversial due to limited independent replication outside the St. Petersburg Institute of
  Bioregulation and Gerontology.


  ## Limitations


  All cited studies originate from a single research group in Russia. No large-scale randomised
  controlled trials, Western peer-reviewed mechanistic validation, or FDA/EMA regulatory filings
  exist. Pharmacokinetics (half-life, tissue distribution) are unreported. Dosing protocols in case
  series are not detailed. The epigenetic mechanism, while supported by in silico docking and Ki-67
  expression assays, lacks structural biochemistry (e.g., crystallography, ChIP-seq) or
  demonstration in non-Russian labs.


  ## Positioning


  Vesugen is positioned as a **geroprotective vascular agent** for age-related endothelial
  dysfunction, atherosclerosis prevention, and vascular wall protection. It is used in Russia within
  integrative geriatric protocols combining multiple tissue-specific Khavinson peptides. Outside
  Russia, it is available via research peptide suppliers but has not entered mainstream clinical use
  or regulatory pathways.
