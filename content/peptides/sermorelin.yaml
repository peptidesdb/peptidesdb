synergy:
  stacks:
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: strong
      rationale: >-
        Sermorelin (GHRH analogue) and ipamorelin (selective GHRP) form the
        prototypical GHRH+GHRP dual-axis stack at the lowest cost. Both peak
        within 30 min and produce a sharp physiological GH pulse without
        cortisol/prolactin elevation.
      protocol:
        Sermorelin: "200–300 mcg SQ · pre-sleep"
        Ipamorelin: "200–300 mcg SQ · same injection"
      primary_benefit: "Pulsatile GH stimulation, recovery, body composition"
