summary:
  value: >-
    344-amino-acid isoform of follistatin, an endogenous glycoprotein that binds and neutralizes
    myostatin and activin A. Lacks the heparin-binding domain of FST-315, resulting in systemic
    circulation rather than tissue sequestration. Investigated as a myostatin antagonist for
    skeletal muscle hypertrophy and sarcopenia treatment. Mechanism centers on disruption of
    myostatin-ActRIIB signaling, relieving brake on muscle protein synthesis.
