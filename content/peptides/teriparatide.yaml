administration:
  steps:
    - title: Device preparation
      body: >-
        Teriparatide is supplied in pre-filled pen injectors (Forteo pen). Store refrigerated at 2-8
        °C until first use. After first injection, pen may be kept at room temperature for up to 28
        days. Do not freeze.
      cite: []
    - title: Injection site
      body: >-
        Subcutaneous injection into thigh or lower abdomen. Rotate sites daily to avoid
        lipodystrophy. Avoid areas with scars, bruises, or active skin conditions.
      cite: []
    - title: Timing
      body: >-
        Once daily, at approximately the same time each day. Morning or evening administration is
        acceptable. Take while sitting or lying down to minimize orthostatic hypotension risk.
      cite: []
    - title: Injection technique
      body: >-
        Clean injection site with alcohol swab. Pinch skin, insert needle at 90° angle, and inject
        full dose (20 mcg). Hold for 5 seconds before withdrawing needle. Do not rub injection site.
      cite: []
    - title: Monitoring
      body: >-
        Baseline and periodic monitoring of serum calcium, urinary calcium, serum PTH (if
        hypoparathyroidism), and bone mineral density (DXA scan). Monitor for hypercalcemia 4-6
        hours post-dose if symptomatic.
      cite: []
    - title: Calcium and vitamin D supplementation
      body: >-
        Ensure adequate calcium (1000-1200 mg/day) and vitamin D (800-1000 IU/day) intake unless
        contraindicated by hypercalcemia or hypercalciuria.
      cite: []
synergy:
  stacks:
    - partner_slug: denosumab
      partner_label: Denosumab
      synergy: strong
      rationale: >-
        Sequential therapy — teriparatide (anabolic phase) followed by denosumab (anti-resorptive
        phase) — maximizes bone mineral density gains and prevents post-teriparatide bone loss.
        Teriparatide builds bone for 12-18 months; denosumab locks in gains by inhibiting
        osteoclast-mediated resorption. Concurrent use not recommended due to denosumab blunting
        teriparatide's anabolic effect.
      protocol:
        Teriparatide: 20 mcg SQ daily × 18-24 months
        Denosumab: 60 mg SQ every 6 months (start after teriparatide completion)
        Sequence: Anabolic → Anti-resorptive transition
      primary_benefit: Maximal BMD gain with sustained anti-fracture protection
      cite: []
    - partner_slug: pyrroloquinoline-quinone
      partner_label: Pyrroloquinoline Quinone (PQQ)
      synergy: moderate
      rationale: >-
        PQQ activates Nrf2 signaling, which upregulates PTH1R (parathyroid hormone 1 receptor)
        expression on osteoblasts. In preclinical models, PQQ supplementation during teriparatide
        therapy enhances peak bone mass acquisition and potentiates anabolic response by increasing
        receptor density. Nrf2-Pth1r axis represents a nutritional augmentation strategy.
      protocol:
        Teriparatide: 20 mcg SQ daily
        PQQ: 10-20 mg oral daily
        Timing: PQQ taken with morning meal; teriparatide any time
      primary_benefit: Enhanced osteoblast response to PTH signaling; improved peak bone mass
      cite:
        - xue-2026
    - partner_slug: physical-activity
      partner_label: Resistance Exercise
      synergy: moderate
      rationale: >-
        Mechanical loading via resistance exercise provides anabolic stimulus that complements
        teriparatide's osteoblast activation. In-silico modeling and clinical data suggest exercise
        augments drug efficacy by activating mechanotransduction pathways and reducing bone
        remodeling surface depletion. Weight-bearing activity during teriparatide therapy optimizes
        bone quality and microarchitecture.
      protocol:
        Teriparatide: 20 mcg SQ daily
        Exercise: Resistance training 3×/week; weight-bearing aerobic activity
        Timing: Exercise any time of day; no temporal interaction with injection
      primary_benefit: Synergistic bone formation; improved bone quality and strength
      cite:
        - ruizlozano-2026
description_md: >-
  Teriparatide is the recombinant N-terminal 34-amino-acid fragment of human parathyroid hormone
  (PTH 1-34), FDA-approved in 2002 for the treatment of severe osteoporosis in postmenopausal women
  and men at high fracture risk, glucocorticoid-induced osteoporosis, and hypoparathyroidism. Unlike
  anti-resorptive therapies (bisphosphonates, denosumab), teriparatide is a bone anabolic agent that
  directly stimulates osteoblast activity, increasing bone mineral density at both trabecular
  (spine) and cortical (hip) sites.


  Intermittent daily subcutaneous administration preserves the anabolic window by avoiding
  continuous PTH exposure, which would otherwise induce catabolic bone resorption. The anabolic
  effect is mediated by PTH1R activation on osteoblasts, triggering cAMP/PKA signaling cascades that
  drive osteoblast differentiation, bone matrix synthesis, and upregulation of paracrine factors
  such as MCP1/CCL2, which amplifies the anabolic response.


  Clinical efficacy wanes after 12-18 months due to receptor desensitization, depletion of
  bone-forming surfaces, exhaustion of osteoblast progenitor pools, and upregulation of endogenous
  Wnt antagonists (sclerostin, DKK1). FDA-approved maximum cumulative exposure is 24 months.
  Sequential therapy with anti-resorptive agents (denosumab, bisphosphonates) after teriparatide
  discontinuation is critical to prevent rapid bone loss.


  Teriparatide carries a black-box warning for osteosarcoma risk based on rat studies showing
  dose-dependent bone tumors; however, no increased osteosarcoma incidence has been observed in
  human post-marketing surveillance. Contraindications include Paget's disease, skeletal malignancy,
  prior skeletal radiation, and hypercalcemic disorders. Common adverse effects include transient
  hypercalcemia, orthostatic hypotension, nausea, and leg cramps.


  Emerging data suggest genetic polymorphisms (e.g., ALDH2 variants) and nutritional factors (e.g.,
  PQQ-mediated Nrf2 activation) may modulate individual response to teriparatide therapy.
  Combination strategies, such as resistance exercise during treatment, may extend the anabolic
  window and optimize bone quality outcomes.
