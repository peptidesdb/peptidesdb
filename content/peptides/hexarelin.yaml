schema_version: 1
slug: hexarelin
name: Hexarelin
peptide_class: GHRP / Ghrelin Receptor Agonist
classification: Hexapeptide GHRP · Cardio-tropic
categories: [gh-axis, ghrp, ghrelin, cardio-tropic]
aliases: [Hex, "Examorelin"]
color: purple
evidence_level: phase-1
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Synthetic hexapeptide GHRP that activates the ghrelin receptor (GHS-R1a)
  with high potency. Distinct from ipamorelin in producing a stronger GH
  pulse but with measurable cortisol + prolactin elevation at higher doses.
  Most-studied GHRP for direct cardiomyocyte effects independent of GH —
  binding myocardial CD36 and the GHS receptor in cardiac tissue.

