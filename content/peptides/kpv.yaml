schema_version: 1
slug: kpv
name: KPV
peptide_class: Tripeptide (Lys-Pro-Val)
classification: α-MSH C-terminal · Anti-inflammatory
categories: [anti-inflammatory, gut, skin, healing, ibd]
aliases: ["Lys-Pro-Val", "alpha-MSH 11-13"]
color: cyan
