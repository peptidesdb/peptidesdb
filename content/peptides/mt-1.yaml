administration:
  steps:
    - title: Implant insertion
      body: >-
        Performed by trained healthcare provider. Sterile technique. Small incision in upper arm
        (triceps) or lower abdomen using trocar. 16 mg rod (4 mm × 1.5 cm) inserted subcutaneously.
      cite: []
    - title: Site care
      body: >-
        Pressure applied post-insertion. Sterile dressing × 24 hrs. Avoid strenuous activity for
        24–48 hrs to prevent extrusion.
      cite: []
    - title: Release kinetics
      body: >-
        Slow biodegradable polymer matrix releases afamelanotide over 60 days, maintaining
        therapeutic plasma levels without daily dosing.
      cite: []
    - title: Repeat dosing
      body: >-
        New implant every 60 days during high UV season (spring–autumn in temperate climates).
        Rotate implant sites to avoid scarring.
      cite: []
    - title: Monitoring
      body: >-
        Baseline and periodic dermatologic exams to document pigmented lesions. Patient education on
        self-examination for new/changing nevi.
      cite: []
description_md: >-
  ## Clinical Context


  Afamelanotide (MT-1, Scenesse®) is the only α-MSH analogue approved for clinical use, licensed
  under orphan drug designation for erythropoietic protoporphyria (EPP) — a rare genetic disorder
  causing severe phototoxicity. By stimulating eumelanin production via MC1R, afamelanotide enables
  EPP patients to tolerate daylight exposure without debilitating pain.


  ## Unregulated Use


  The candidate papers highlight a critical public health issue: unregulated internet/gym sales of
  'melanotan-1' (and the distinct analogue melanotan-2) marketed for cosmetic tanning. These
  products carry risks of contamination, misdosing, blood-borne pathogen transmission from needle
  sharing, and melanocytic dysplasia. Dermatologists report patients presenting with rapidly
  darkening nevi and unexpectedly deep tans — red flags for illicit melanotan use.


  ## Stability & Formulation


  The Chawathe (2026) stability analysis underscores the critical role of norleucine (position 4)
  and D-phenylalanine (position 7) substitutions: they confer peptidase resistance, enabling the
  60-day controlled-release implant formulation. Native α-MSH, with methionine and L-phenylalanine
  at these positions, degrades rapidly.


  ## Safety Profile


  Within the FDA-approved indication, afamelanotide is well-tolerated. However, the melanocortin
  receptor family's pleiotropic functions (pigmentation, inflammation, appetite, sexual function)
  mean that off-label or unregulated use invites unpredictable systemic effects. The theoretical
  melanoma risk from chronic MC1R stimulation remains unresolved; long-term surveillance studies in
  EPP cohorts are ongoing.


  ## Research Landscape


  Beyond EPP, afamelanotide is under investigation for:

  - Vitiligo (repigmentation)

  - Polymorphous light eruption

  - Actinic keratosis prevention


  These indications remain experimental; no approvals exist outside EPP.
