description_md: >-
  **ACE-031 (Ramatercept)** is a soluble activin receptor IIB-Fc fusion protein developed by
  Acceleron Pharma as a myostatin inhibitor for muscle-wasting conditions. The molecule consists of
  the extracellular ligand-binding domain of human activin receptor type IIB fused to the Fc region
  of human immunoglobulin G1.


  ## Mechanism of Action


  ACE-031 functions as a **decoy receptor** for myostatin and related TGF-β superfamily ligands
  including GDF11 and activin A. By binding these circulating growth inhibitors, ACE-031 prevents
  their interaction with endogenous ActRIIB receptors on muscle tissue. This competitive inhibition
  blocks downstream SMAD2/3 signaling, lifting the brake on skeletal muscle growth and permitting
  hypertrophy beyond normal physiological limits.


  Myostatin is the primary negative regulator of muscle mass; its genetic deletion in cattle and
  mice produces dramatic muscle hypertrophy. ACE-031 mimics this effect pharmacologically.


  ## Clinical Development and Halt


  Acceleron initiated Phase 2 trials in **Duchenne muscular dystrophy (DMD)** patients, aiming to
  counteract progressive muscle degeneration. However, in **2011**, the trial was voluntarily
  discontinued after safety monitoring revealed:


  - **Epistaxis** (nosebleeds) in multiple participants  

  - **Telangiectasia** (dilated superficial blood vessels)  

  - Concerns regarding vascular remodeling  


  These adverse events likely stem from ActRIIB's role in vascular homeostasis and angiogenesis.
  ALK1, a type I receptor in the TGF-β pathway, interacts with ActRIIB to regulate endothelial cell
  function; systemic ActRIIB inhibition may disrupt this balance, leading to vascular fragility and
  abnormal capillary formation.


  Following the halt, Acceleron did not resume ACE-031 development, pivoting instead to luspatercept
  (a related ActRIIA-Fc fusion with different safety profile).


  ## Black Market and Doping Concerns


  Despite having no pharmaceutical approval, ACE-031 is sold as a "research chemical" in underground
  markets and among bodybuilding communities. A **2025 study** analyzed 14 black market ACE-031
  products using gel electrophoresis and Western blotting:


  - **12 products** contained ACVR2B-immunoreactive protein at ~58.4 kDa  

  - All 12 showed **multiple additional protein bands** by SDS-PAGE, indicating significant
  contamination  

  - **2 products** contained no detectable ACE-031  


  This lack of quality control poses severe health risks including immunogenicity, infection, and
  unknown toxic effects from contaminants.


  The **World Anti-Doping Agency (WADA)** prohibits ACE-031 under category **S4.3 (Myostatin
  Inhibitors)**. Detection methods using ACVR2B-specific antibodies and electrophoretic profiling
  are employed by accredited doping control laboratories.


  ## Safety Profile


  The vascular side effects observed in clinical trials are particularly concerning given ActRIIB's
  pleiotropic roles beyond muscle regulation:


  - **Vascular remodeling:** ActRIIB signaling influences endothelial cell proliferation and vessel
  wall integrity  

  - **Hereditary hemorrhagic telangiectasia (HHT):** A genetic disorder involving ALK1 mutations
  shares phenotypic overlap with ACE-031 adverse events  

  - **Hemostasis:** Increased epistaxis suggests potential coagulation or vascular fragility
  issues  


  These safety signals, combined with the unknown long-term effects of chronic myostatin inhibition
  on cardiac muscle and metabolic health, make ACE-031 a high-risk agent unsuitable for human use
  outside controlled clinical research.


  ## Regulatory and Ethical Context


  ACE-031 represents a cautionary case in peptide pharmacology where a mechanistically rational
  therapy encountered unforeseen systemic toxicities due to the target's broader biological role.
  The availability of unregulated ACE-031 via black markets exemplifies the risks of bypassing
  pharmaceutical oversight, particularly for agents with incomplete safety datasets and no approved
  indication.
