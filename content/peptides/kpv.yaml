      rationale: >-
        KPV (NF-κB inhibition, cytokine reduction) + BPC-157 (VEGF-driven
        angiogenesis, tissue regeneration) form the classic gut-healing
        stack. KPV reduces inflammatory drive; BPC-157 promotes mucosal
        repair. Anecdotally favoured for IBD, ulcerative colitis, and
        post-surgical gut recovery.
      protocol:
        KPV: "200–500 mcg oral · daily"
        BPC-157: "250–500 mcg oral or SQ · daily"
      primary_benefit: "Combined anti-inflammation + mucosal repair for gut conditions"
