administration:
  steps:
    - title: Reconstitution
      body: "Add 1–2 mL bacteriostatic water to a 5 mg vial. Roll gently; do not shake. Solution should be clear and colourless."
    - title: Injection site
      body: "Subcutaneous near the injury site is the most common anecdotal route. Systemic SQ (abdomen) also used. Rotate sites."
    - title: Timing
      body: "No strict timing requirement. Most users dose once or twice daily, often morning + evening."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate 2–8 °C, use within 30 days."
    - title: Needle
      body: "27–31G insulin syringe, 4–8 mm. Local injection allows finer 31G."

synergy:
  stacks:
    - partner_slug: tb-500
      partner_label: TB-500
      synergy: strong
      rationale: >-
        BPC-157 and TB-500 (Thymosin β-4) target distinct healing axes: BPC-157
        upregulates VEGF-driven angiogenesis and fibroblast migration; TB-500
        increases actin remodelling and cell migration via the actin-sequestering
        β-thymosin domain. Stacked, they cover both vascular (BPC) and structural
        (TB-500) regeneration pathways. Anecdotally favoured for tendon and
        ligament repair where both pathways contribute.
      protocol:
        BPC-157: "250–500 mcg SQ · daily"
        TB-500: "2 mg SQ · 2× per week"
      primary_benefit: "Tendon/ligament/muscle repair via complementary angiogenesis + migration"
