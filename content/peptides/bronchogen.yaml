summary:
  value: >-
    Ala-Glu-Asp-Leu tetrapeptide developed within the Khavinson bioregulator tradition. Demonstrated
    bronchopulmonary tissue regeneration in rat COPD models, restoring ciliated epithelium,
    normalizing secretory IgA, and reducing neutrophilic inflammation. Administered at 0.05 ng/mL in
    organotypic culture, the peptide showed tissue-specific stimulation of bronchial explants in
    both young and aged rats.
