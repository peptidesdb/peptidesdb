contributors: [peptidesdb-core]

summary: >-
  Synthetic tetrapeptide (Ala-Glu-Asp-Gly) developed at the Saint Petersburg
  Institute of Bioregulation and Gerontology as the active analog of
  epithalamin, a natural pineal extract. Khavinson et al. demonstrated
  telomerase-activating and telomere-elongating activity in human somatic
  cells. Long-term safety + efficacy data are dominated by Russian-language
  literature; Western RCTs are sparse. Frequently used anecdotally for
  longevity and sleep regulation.

