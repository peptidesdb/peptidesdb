      partner_label: BPC-157
      synergy: moderate
      rationale: >-
        Des(1-3)IGF-1 promotes myoblast differentiation and protein synthesis, while BPC-157
        enhances tissue repair, angiogenesis, and collagen synthesis. Both act on distinct pathways
