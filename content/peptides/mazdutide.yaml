administration:
  steps:
    - title: Preparation
      body: >-
        Pre-filled pen or vial format. If lyophilized, reconstitute per manufacturer protocol with
        supplied diluent. Inspect for particulates; solution should be clear or slightly opalescent.
      cite:
        - ji-2026
    - title: Injection site
      body: >-
        Subcutaneous — abdomen (avoid 5 cm around navel) or anterior thigh. Rotate injection sites
        weekly to minimize lipodystrophy.
      cite:
        - ji-2026
    - title: Timing
      body: >-
        Once weekly, same day each week. Can be administered with or without meals. Administer at
        consistent time for adherence.
      cite:
        - ji-2026
    - title: Dose escalation
      body: >-
        Start at 3 mg weekly. If tolerated, escalate to 6 mg after 4 weeks, then to 9 mg after
        another 4 weeks as indicated. Titration reduces GI side effects.
      cite:
        - ji-2026
    - title: Storage
      body: >-
        Refrigerate at 2–8 °C. If pre-filled pen, may be stored at room temperature (≤25 °C) for up
        to 21 days. Protect from light. Do not freeze.
      cite: []
    - title: Missed dose
      body: >-
        If ≤2 days late, administer immediately. If >2 days, skip and resume at next scheduled dose.
        Do not double dose.
      cite: []
    - title: Needle disposal
      body: Use sharps container. Follow local regulations for biological waste disposal.
      cite: []
synergy:
  stacks:
    - partner_slug: tirzepatide
      partner_label: Tirzepatide
      synergy: multi-pathway
      rationale: >-
        Both are dual/triple incretin agonists targeting overlapping pathways (GLP-1/GIP for
        tirzepatide, GLP-1/glucagon for mazdutide). While not typically combined due to redundancy
        and increased adverse event risk, sequential use or alternating protocols in research
        settings may explore differential receptor activation profiles. Mazdutide's glucagon
        component may offer hepatic and energy expenditure advantages, while tirzepatide's GIP
        agonism enhances insulin sensitivity. Combination not recommended in clinical practice
        without clear evidence.
      protocol:
        Mazdutide: 6 mg SC weekly
        Tirzepatide: 10 mg SC weekly (alternate weeks in experimental contexts)
        Monitoring: Frequent glucose, lipid, and GI tolerance assessment
      primary_benefit: Theoretical maximal incretin axis engagement; requires evidence
      cite:
        - abulehia-2026
        - chan-2026
    - partner_slug: metformin
      partner_label: Metformin
      synergy: moderate
      rationale: >-
        Metformin's AMPK activation and hepatic glucose output suppression complement mazdutide's
        dual incretin/glucagon pathway effects. Mazdutide enhances insulin secretion and energy
        expenditure, while metformin improves peripheral insulin sensitivity and reduces hepatic
        gluconeogenesis. Combination may improve glycemic control in type 2 diabetes with additive
        weight loss and metabolic benefit. Monitor for GI intolerance with both agents.
      protocol:
        Mazdutide: 6–9 mg SC weekly
        Metformin: 1000–2000 mg PO daily (extended-release preferred)
        Timing: Metformin with meals, mazdutide on fixed weekly schedule
      primary_benefit: Enhanced glycemic control, hepatic insulin sensitivity, weight loss
      cite:
        - chen-2026
    - partner_slug: sglt2-inhibitors
      partner_label: SGLT2 Inhibitors
      synergy: moderate
      rationale: >-
        SGLT2 inhibitors (e.g., empagliflozin, dapagliflozin) promote urinary glucose excretion and
        natriuresis, complementing mazdutide's insulin secretion and appetite suppression.
        Combination provides multi-pathway glycemic control, additional weight loss, and potential
        cardiovascular and renal protection. Monitor for volume depletion and ketoacidosis risk
        (rare with GLP-1 co-therapy). Emerging combination in T2D management.
      protocol:
        Mazdutide: 6–9 mg SC weekly
        SGLT2i: Empagliflozin 10–25 mg PO daily or equivalent
        Hydration: Ensure adequate fluid intake
      primary_benefit: Maximal weight loss, glycemic control, cardio-renal protection
      cite:
        - chen-2026
description_md: >-
  ## Overview


  Mazdutide (IBI362, LY3305677) is a synthetic oxyntomodulin analog engineered for balanced dual
  agonism at the GLP-1 and glucagon receptors. Developed through a collaboration between Innovent
  Biologics (China) and Eli Lilly, mazdutide entered Phase 3 clinical trials in China for obesity
  and type 2 diabetes in 2025–2026. Its once-weekly subcutaneous administration and dual-pathway
  mechanism position it within the emerging class of next-generation incretin-based therapeutics.


  ## Mechanism Context


  Oxyntomodulin, the endogenous template for mazdutide, is a 37-amino-acid peptide co-secreted with
  GLP-1 from intestinal L-cells. It exhibits weak agonism at both GLP-1 and glucagon receptors,
  producing anorexigenic and energy-expenditure effects. Mazdutide's synthetic modification enhances
  receptor affinity, prolongs half-life, and balances GLP-1R-mediated satiety/insulin secretion with
  GCGR-mediated hepatic lipid metabolism and thermogenesis. This dual engagement differentiates
  mazdutide from selective GLP-1 agonists (e.g., semaglutide) and positions it alongside other
  multi-receptor agonists like tirzepatide (GLP-1/GIP) and retatrutide (GLP-1/GIP/glucagon).


  ## Clinical Development


  Phase 2 trials in Chinese adults with obesity (BMI ≥28–30 kg/m²) demonstrated dose-dependent
  weight loss, with the 9 mg weekly dose achieving ~12–15% body weight reduction over 24 weeks.
  Phase 3 programs are evaluating efficacy in obesity, type 2 diabetes, and potentially metabolic
  dysfunction-associated steatotic liver disease (MASLD). Patent filings extend to hyperuricemia and
  adolescent obesity indications. Innovent holds primary development rights in China and select
  Asian markets, while Eli Lilly retains rights in other territories.


  ## Preclinical MASLD Data


  In murine models of high-fat-diet-induced MASLD, mazdutide (100–400 μg/kg) reduced hepatic
  triglycerides, improved histopathology, and decreased ER stress markers (CHOP, GRP78).
  Pro-inflammatory cytokines (TNF-α, IL-6) and serum ALT/AST declined dose-dependently. These
  findings suggest potential for hepatic indication expansion pending clinical validation.


  ## Comparative Positioning


  Network meta-analyses rank mazdutide favorably among glucagon receptor agonists for weight loss
  and metabolic outcomes, with efficacy comparable to tirzepatide and survodutide. Its once-weekly
  dosing and dual-pathway mechanism offer advantages over daily GLP-1 monotherapies, though
  head-to-head trials are limited. GI tolerability profiles resemble the GLP-1 class, with dose
  titration mitigating nausea and vomiting.


  ## Regulatory Outlook


  As of Q2 2026, mazdutide remains investigational. Chinese regulatory approval (NMPA) is
  anticipated in 2027 pending Phase 3 completion. FDA and EMA filings are expected to follow if
  global trials demonstrate consistent safety and efficacy. The oxyntomodulin analog framework and
  dual-agonist mechanism face established precedent (tirzepatide FDA approval, 2022), potentially
  accelerating review timelines.


  ## Research Gaps


  Long-term cardiovascular outcome trials (CVOT) are not yet initiated. Durability of weight loss
  after discontinuation, comparative efficacy vs. triple agonists (retatrutide), and real-world
  adherence data remain to be established. Hepatic indication trials (MASLD) are preclinical; human
  data are needed. Pediatric and geriatric populations are under-studied.
