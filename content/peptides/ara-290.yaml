description_md: >-
  ## Overview


  ARA290 (cibinetide) is an 11-amino-acid synthetic peptide derived from the helix B surface domain
  of erythropoietin (EPO). Unlike recombinant EPO, which drives erythropoiesis and carries
  thrombotic risk, ARA290 selectively activates the tissue-protective EPO/CD131 heteroreceptor
  (β-common receptor) while sparing the EPOR homodimer responsible for red blood cell production.


  ## Mechanism & Selectivity


  ARA290 binds the heteromeric complex of EPOR and CD131 (β-common receptor), triggering PI3K-AKT
  signaling rather than the JAK2-STAT5 pathway that mediates hematopoiesis. This selectivity
  decouples EPO's cytoprotective effects—anti-apoptosis, anti-inflammation, endothelial
  stabilization—from its erythropoietic and thrombotic liabilities.


  Structural modifications, including pyroglutamate at the N-terminus (pHBSP variant), enhance
  stability and receptor selectivity. The peptide has demonstrated tissue-protective effects across
  multiple organ systems: central and peripheral nervous systems, kidneys, pancreatic islets, and
  cardiovascular tissues.


  ## Clinical Development


  Phase 2 trials in sarcoidosis-related small fiber neuropathy and diabetic peripheral neuropathy
  showed symptom improvement with 4 mg daily subcutaneous dosing. The peptide is well-tolerated with
  minimal immunogenicity and no hematocrit elevation. Unlike native EPO, ARA290 does not induce
  polycythemia, hypertension, or thrombotic events.


  ## Preclinical Evidence


  Animal models demonstrate ARA290's efficacy in:

  - Cerebral ischemia (reduced infarct volume, apoptosis inhibition)

  - Cisplatin-induced nephrotoxicity (renal protection, reduced apoptosis)

  - Hemolytic-uremic syndrome (endothelial protection)

  - Cardiac aging (reduced inflammation, improved mitochondrial function)

  - Pancreatic islet stress (protection during transplantation)


  ## Comparator: EPO vs ARA290


  Recombinant EPO activates both EPOR homodimers (erythropoiesis) and EPOR/CD131 heteromers (tissue
  protection). Long-term EPO use causes polycythemia, hypertension, and stroke risk. ARA290 isolates
  the tissue-protective arm, avoiding hematologic side effects while preserving anti-inflammatory
  and anti-apoptotic signaling.


  ## Current Status


  Phase 2 trials completed; regulatory path unclear. Not FDA-approved. Used off-label in neuropathy
  and tissue-injury contexts. No commercial formulation widely available as of 2026.
