    value: "Melanocortin-4 receptor (MC4R) in hypothalamus"
    cite: [simerly-2023, fda-vyleesi-label-2019]
  pathway:
    value: "MC4R agonism in paraventricular nucleus → autonomic + neuroendocrine sexual arousal pathways"
    cite: [simerly-2023]
  downstream_effect:
    value: "Increased sexual desire and arousal; central rather than peripheral mechanism"
    cite: [clayton-2015]
  origin:
    value: "Cyclic 7-AA peptide derived from α-MSH (agonist Ac-Nle-Asp-His-D-Phe-Arg-Trp-Lys-OH cyclic)"
    cite: [fda-vyleesi-label-2019]
  diagram:
