schema_version: 1
slug: selank
name: Selank
peptide_class: Heptapeptide bioregulator
classification: Anxiolytic + Cognitive · Russian Pharma
categories: [cognitive, anxiolytic, immunomodulator, peptide-bioregulator]
aliases: ["Selanc", "Selankum", "TP-7"]
color: purple
evidence_level: human-mechanistic
fda_approved: false
last_reviewed: "2026-04-25"
maturity: draft
contributors: [peptidesdb-core]

summary: >-
  Synthetic 7-amino-acid peptide developed at the Russian Academy of Medical
  Sciences from the immunomodulator tuftsin. Demonstrates anxiolytic effects
  comparable to benzodiazepines but without sedation, cognitive impairment,
  or dependency. Acts via modulation of monoamine neurotransmission and the
  immune-CNS axis. Licensed in Russia + Ukraine; not approved elsewhere.

hero_stats:
  - value: "150–300 mcg/dose"
    label: "Intranasal"
    cite: [zaderej-2014]
  - value: "Human"
    label: "Mechanistic"
    cite: [zaderej-2014, medvedev-2007]
  - value: "~30 min"
    label: "Onset"
hero_route: "Intranasal · 2–3×/day during stress / cognitive demand"

mechanism:
  primary_target:
    value: "Monoamine system (serotonin / GABA modulation) + immunomodulation via tuftsin domain"
    cite: [zaderej-2014]
  pathway:
    value: "Tuftsin-derived immune signaling + CNS monoamine modulation → reduced anxiety + improved mood / cognition"
    cite: [medvedev-2007]
  downstream_effect:
    value: "Anxiolytic + cognitive enhancement; immunomodulation via increased IL-6 + IFN-γ"
    cite: [medvedev-2007, zaderej-2014]
  origin:
    value: "Synthetic 7-AA peptide derived from human tuftsin (immune-system tetrapeptide)"
    cite: [zaderej-2014]
  feedback_intact:
    value: "No GABA-receptor binding; no dependence reported"
    badge: green
    cite: [medvedev-2007]
  diagram:
