schema_version: 1
slug: ss-31
name: SS-31
peptide_class: Mitochondrial-targeted tetrapeptide
classification: Cardiolipin-binding · Mitochondrial protective
categories: [mitochondrial, cardiovascular, longevity, ischemia-reperfusion]
aliases: [Elamipretide, Bendavia, MTP-131]
color: teal
evidence_level: phase-3
fda_approved: false
