administration:
  steps:
    - title: Reconstitution
      body: >-
        Add 1–2 mL bacteriostatic water to lyophilized vial. Swirl gently — do not shake. Solution
        should be clear to slightly opalescent.
      cite: []
    - title: Injection site
      body: >-
        Subcutaneous — abdomen or thigh. Rotate sites to avoid lipodystrophy. Avoid areas with scar
        tissue or active inflammation.
      cite: []
    - title: Timing
      body: >-
        Post-training preferred (within 30–60 min) to align with endogenous MGF expression window.
        Alternatively, daily morning dose on non-training days.
      cite: []
    - title: Storage
      body: >-
        Lyophilized: room temperature, light-protected, desiccated. Reconstituted: refrigerate 2–8
        °C, use within 14–21 days.
      cite: []
    - title: Needle
      body: >-
        29–31G insulin syringe, 8–12 mm length. Pinch skin fold, insert at 45° angle for
        subcutaneous delivery.
      cite: []
synergy:
  stacks:
    - partner_slug: bpc-157
      partner_label: BPC-157
      synergy: moderate
      rationale: >-
        BPC-157 promotes angiogenesis and tendon/ligament repair via VEGF and growth factor
        modulation, while PEG-MGF targets satellite cell activation and myocyte proliferation.
        Complementary pathways for comprehensive tissue repair post-injury or intensive training.
        BPC-157's systemic stability and oral bioavailability contrast with PEG-MGF's localized
        IGF-1R signaling.
      protocol:
        PEG-MGF: 100–200 mcg SQ post-training
        BPC-157: 250–500 mcg SQ or oral, twice daily
        Duration: 4–6 weeks (injury-dependent)
      primary_benefit: Accelerated muscle and connective tissue repair, enhanced recovery
      cite: []
    - partner_slug: tb-500
      partner_label: TB-500
      synergy: strong
      rationale: >-
        TB-500 (Thymosin Beta-4 fragment) upregulates actin polymerization, cell migration, and
        anti-inflammatory pathways, while PEG-MGF drives satellite cell proliferation via
        IGF-1R/mTOR. Synergistic for muscle regeneration: TB-500 mobilizes progenitor cells, PEG-MGF
        stimulates their differentiation into myocytes. Both have overlapping but distinct repair
        cascades.
      protocol:
        PEG-MGF: 100–200 mcg SQ post-training
        TB-500: 2–5 mg SQ, 2× per week (loading), then weekly
        Timing: Stagger injections by 6–12 hours
      primary_benefit: Maximal satellite cell recruitment and myogenic differentiation, injury repair
      cite: []
description_md: >-
  PEG-MGF is a research-grade peptide with no published human clinical trials. Evidence is
  extrapolated from IGF-1 biology and animal models of PEGylated growth factors. Native MGF (mechano
  growth factor) is a splice variant of the IGF-1 gene transiently expressed in muscle tissue
  following mechanical stress. The addition of polyethylene glycol extends its half-life from
  minutes to hours, theoretically improving systemic availability. However, PEGylation introduces
  steric hindrance that reduces receptor binding affinity, and chronic PEG exposure carries unknown
  immunogenicity and tissue accumulation risks. This peptide is not FDA-approved and lacks validated
  dosing, safety, or efficacy data in humans. Use is limited to experimental contexts.
