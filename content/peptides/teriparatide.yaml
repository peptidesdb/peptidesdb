summary:
  value: >-
    Recombinant 1-34 fragment of human parathyroid hormone, FDA-approved (Forteo, 2002) for severe
    osteoporosis, glucocorticoid-induced osteoporosis, and hypoparathyroidism. Daily subcutaneous
    administration stimulates osteoblast-mediated bone formation, increasing bone mineral density at
    spine and hip. Anabolic effect wanes after 12-18 months due to receptor desensitization,
    depletion of bone-forming surfaces, and upregulation of endogenous Wnt antagonists.
  cite:
    - tournis-2026
    - ferrari-2026
