      synergy: strong
      rationale: >-
        Hexarelin (GHRP) + CJC-1295-no-DAC (GHRH analogue) is the
        higher-amplitude variant of the standard GHRH+GHRP stack. Hexarelin
        produces a stronger pulse than ipamorelin but with cortisol +
        prolactin signal — choose this stack for maximum GH amplitude when
        side-effect tolerance is acceptable. Cycle aggressively.
      protocol:
        Hexarelin: "100 mcg SQ · pre-sleep"
        "CJC-1295 (no DAC)": "100 mcg SQ · same injection"
      primary_benefit: "Maximum GH pulse amplitude (with side-effect signal)"
      cite: [smith-1996-hexarelin, teichman-2006]
