maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Synthetic four-amino-acid peptide that selectively localises to the inner
  mitochondrial membrane by binding cardiolipin. Stabilises cristae structure,
  preserves electron transport chain efficiency, and reduces ROS generation
  in stressed mitochondria. Multiple Phase 3 trials in ischemia-reperfusion,
  primary mitochondrial myopathy (Barth syndrome), and dry AMD; not yet
  FDA-approved as of 2026.

