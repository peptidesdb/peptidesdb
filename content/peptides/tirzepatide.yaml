  downstream_effect:
    value: "Profound glycemic improvement and weight reduction; cardiometabolic benefits"
    cite: [jastreboff-2022]
  origin:
    value: "39-AA peptide with C-20 fatty-acid acylation. Single molecule with balanced GIP + GLP-1 affinity"
    cite: [frias-2018]
