summary: >-
  Earlier-generation hexapeptide GHRP — His-D-Trp-Ala-Trp-D-Phe-Lys-NH₂.
  Among the first GHRPs characterised by the Bowers lab. Produces strong
  GH release plus pronounced appetite stimulation via ghrelin-receptor
  agonism. Largely superseded by ipamorelin (selectivity) and GHRP-2
  (potency without the same hunger), but retains niche use where caloric
  intake support is desired.

