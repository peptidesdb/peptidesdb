contributors: [peptidesdb-core]

summary: >-
  First-in-class dual agonist of glucose-dependent insulinotropic polypeptide
  (GIP) and glucagon-like peptide-1 (GLP-1) receptors. FDA-approved 2022 for
  type 2 diabetes (Mounjaro) and 2023 for chronic weight management (Zepbound).
  The SURMOUNT-1 trial showed 20.9% body-weight reduction at 15 mg/week —
  the largest weight-loss outcome of any approved pharmacotherapy.

