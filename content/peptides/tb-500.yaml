administration:
  steps:
    - title: Reconstitution
      body: "Add 1–2 mL bacteriostatic water to 5 mg vial → 2.5–5 mg/mL. Roll gently."
    - title: Injection site
      body: "SQ near injury site (preferred), or systemic SQ (abdomen). Rotate sites."
    - title: Timing
      body: "Evening or pre-sleep is most common anecdotal timing."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate, ≤30 days."
    - title: Needle
      body: "27–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: bpc-157
      partner_label: BPC-157
      synergy: strong
      rationale: >-
        TB-500 and BPC-157 cover complementary halves of tissue repair: BPC-157
        upregulates VEGFR2-driven angiogenesis and fibroblast outgrowth; TB-500
        sequesters G-actin to enable endothelial / epithelial migration. The
        anecdotal canonical "healing stack" — pairs especially well for tendon
        and ligament injuries.
      protocol:
        TB-500: "2 mg SQ · 2× per week"
        BPC-157: "250–500 mcg SQ · daily"
      primary_benefit: "Combined angiogenesis + cell migration for tendon/ligament/muscle repair"
