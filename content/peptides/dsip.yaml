# =========================================================
# DSIP (Delta Sleep-Inducing Peptide)
# =========================================================
schema_version: 1
slug: dsip
name: DSIP
peptide_class: Nonapeptide
classification: Sleep modulator · Anti-stress
categories: [sleep, anti-stress, cognitive]
aliases: ["Delta Sleep-Inducing Peptide", "Trp-Ala-Gly-Gly-Asp-Ala-Ser-Gly-Glu"]
color: purple
evidence_level: human-mechanistic
fda_approved: false
last_reviewed: "2026-04-25"
maturity: draft
contributors: [peptidesdb-core]

summary: >-
  9-amino-acid peptide first isolated from rabbit cerebral venous blood
  during electrically induced delta-wave sleep (Schoenenberger / Monnier,
  1977). Modulates sleep-wake architecture, reduces stress response, and
  shows anxiolytic effects in early human studies. Limited modern RCT
  data; primarily used anecdotally for sleep-onset issues.

hero_stats:
  - value: "100–200 mcg"
    label: "Per dose"
    cite: [schneider-1986-dsip]
  - value: "Human"
    label: "Mechanistic"
    cite: [schneider-1986-dsip]
  - value: "Hours"
    label: "Half-life (est)"
hero_route: "SQ · Pre-sleep · Daily during cycle"

mechanism:
  primary_target:
    value: "Multiple — modulates HPA axis + thalamic delta-wave generation (proposed)"
    cite: [schneider-1986-dsip]
  pathway:
    value: "Reduced cortisol/ACTH + enhanced delta-wave EEG activity → improved sleep onset + depth"
    cite: [schneider-1986-dsip]
  downstream_effect:
    value: "Faster sleep onset, increased delta sleep, reduced stress response, possible anxiolytic effect"
    cite: [schneider-1986-dsip]
  origin:
    value: "Endogenous peptide first isolated from rabbit blood during delta sleep; synthesised exogenously"
    cite: [schneider-1986-dsip]
  diagram:
    - { kind: node, text: "Hypothalamus / HPA axis" }
    - { kind: arrow, text: "↓ DSIP modulation → ↓ cortisol / ACTH" }
    - { kind: node, text: "Thalamic delta-wave generators" }
    - { kind: arrow, text: "↓ Enhanced delta-wave EEG" }
    - { kind: outcome, text: "Improved Sleep Architecture" }

