description_md: >-
  ## Background


  Cortagen (Ala-Glu-Asp-Pro) is a synthetic tetrapeptide developed within the Khavinson school of
  peptide bioregulators, derived from amino acid analysis of the natural brain cortex peptide
  preparation Cortexin. It is structurally distinguished from the closely related peptide epithalon
  (Ala-Glu-Asp-Gly) by the substitution of terminal glycine with proline.


  ## Research Context


  Animal studies demonstrate antioxidant activity in rat models, with reductions in lipid
  peroxidation (LPO) products and oxidative protein modification in serum and cerebral cortex.
  Microarray analysis in mouse heart tissue revealed altered expression across a subset of 15,247
  transcripts, suggesting tissue-specific gene modulation.


  In avian hypophysectomy models, cortagen showed divergent biological activity compared to
  epithalon: while epithalon reversed immune deficits, anemia, and hemostatic abnormalities in
  hypophysectomized chickens, cortagen did not produce these effects, highlighting
  structure-dependent activity profiles within the tetrapeptide class.


  Human applications have been explored in peripheral nerve trauma recovery, with reported
  structural and functional benefits, though detailed protocols remain sparse in the accessible
  literature.


  ## Khavinson Bioregulator Tradition


  Cortagen belongs to a family of short peptides developed by Vladimir Khavinson's research group at
  the St. Petersburg Institute of Bioregulation and Gerontology. This tradition emphasizes
  organ-specific peptide bioregulators derived from tissue extracts, with synthetic analogues
  designed for therapeutic use. The approach is rooted in Soviet-era peptide research and continues
  primarily within Russian scientific institutions.


  ## Evidence Limitations


  Available data are confined to animal mechanistic studies and limited human case references. No
  large-scale randomized controlled trials, pharmacokinetic profiling, or FDA-recognized clinical
  endpoints exist in the accessible literature. The evidence base reflects early-stage exploratory
  research typical of the Khavinson peptide portfolio.
