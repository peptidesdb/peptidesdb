summary:
  value: >-
    Dimeric fusion protein combining soluble activin receptor IIB fragment with Fc domain of human
    IgG1. Acts as decoy receptor for myostatin, GDF11, and other TGF-β superfamily ligands,
    preventing binding to endogenous ActRIIB and disinhibiting skeletal muscle growth. Phase 2 trial
    in Duchenne muscular dystrophy discontinued in 2011 due to safety signals including epistaxis,
    telangiectasia, and vascular abnormalities. Not pharmaceutically approved; circulates on black
    market as research chemical.
  cite: []
