        Duration: 26–52 weeks (trial data)
      primary_benefit: Enhanced weight loss, improved glycemic control, multi-pathway metabolic modulation
      cite:
        - yamauchi-2026
        - ahmed-2026
        - bailey-2026
description_md: >-
  Cagrilintide represents second-generation amylin analogue design, engineered for non-aggregating,
  long-acting pharmacokinetics enabling once-weekly dosing. As a dual AMYR/calcitonin-receptor
  agonist, it mimics physiological amylin signaling while achieving extended duration through
  structural modifications. The combination with semaglutide (CagriSema) leverages multi-pathway
  metabolic modulation, addressing weight loss plateaus and inter-individual variability observed
  with single-pathway therapies. Phase 3 evidence demonstrates superiority over semaglutide
  monotherapy, with ongoing investigation into optimal dosing strategies and long-term outcomes.
  Metabolic profiling studies have characterized its in vitro effects on skeletal muscle
  mitochondrial function under lipotoxic conditions, though clinical implications require further
  study.
