  - value: "200–300 mcg"
    label: "Per dose"
    cite: [raun-1998]
  - value: "Phase 1"
    label: "Evidence level"
    cite: [raun-1998, sigalos-2018]
  - value: "~2 hr"
    label: "Half-life"
    cite: [raun-1998]
