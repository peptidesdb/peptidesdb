summary:
  value: >-
    Synthetic tetrapeptide (Lys-Glu-Asp-Pro) developed in the Khavinson bioregulator tradition for
    prostate-targeted tissue regeneration. Animal and organotypic culture data demonstrate prostatic
    tissue-specific stimulation, chromatin decondensation, and functional restoration in aged and
    BPH models. Acts as putative epigenetic regulator by deheterochromatinization, reversing
    age-related transcriptional silencing in target tissues.
  cite: []
