administration:
  steps:
    - title: Reconstitution
      body: "Add 1 mL bacteriostatic water to 2 mg vial → 2 mg/mL = 200 mcg per 0.1 mL."
    - title: Injection site
      body: "SQ — abdomen preferred. Rotate sites."
    - title: Timing
      body: "Morning, fasted, ideally pre-cardio for amplified fat oxidation."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate, ≤30 days."
    - title: Needle
      body: "29–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: mots-c
      partner_label: MOTS-c
      synergy: moderate
      rationale: >-
        AOD-9604 mobilises FFAs from adipose via β3-AR; MOTS-c upregulates
        AMPK / PGC-1α / FAO machinery so that mobilised FFAs are efficiently
        oxidised. The pathways are sequential — supply (AOD) plus demand
        (MOTS-c) — and produce more durable lipolytic effects than either
        alone in anecdotal protocols.
      protocol:
        AOD-9604: "250–300 mcg SQ · morning fasted (daily)"
        MOTS-c: "5 mg SQ · 2–3× per week (pre-workout)"
      primary_benefit: "Fat mobilisation + mitochondrial oxidation, no IGF-1 concern"
