administration:
  steps:
    - title: Reconstitution
      body: "Add 2.1 mL sterile water to 2 mg lyophilised vial. Roll gently — do not shake. Solution should be clear."
    - title: Injection site
      body: "Subcutaneous — abdomen preferred. Rotate sites (avoid same spot within 2 cm). Avoid navel and waistband area."
    - title: Timing
      body: "Once daily. Preferred: evening, 2–3 hrs post-meal, before sleep — aligns with natural GH secretion pulse."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate 2–8 °C, use within 21 days."
    - title: Needle
      body: "27–31G, 4–8 mm insulin syringe. Pinch skin, 45° angle for lean individuals."

synergy:
  stacks:
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: strong
      rationale: >-
        Tesamorelin (GHRH analogue) and ipamorelin (GHRP / ghrelin mimetic) act
        on two distinct receptor systems to amplify GH release synergistically —
        GHRH receptor + ghrelin receptor. This dual-axis stimulation produces a
        more robust, sustained GH pulse than either alone while maintaining
        physiological pulsatility. Ipamorelin is highly selective with minimal
        cortisol or prolactin elevation, making it the preferred GHRP pairing.
      protocol:
        Tesamorelin: "2 mg SQ · evening"
        Ipamorelin: "200–300 mcg SQ · same injection"
        Frequency: "Once daily, pre-sleep"
      primary_benefit: "Maximal GH pulsatility, fat loss, recovery, sleep quality"
      cite: [raun-1998]
