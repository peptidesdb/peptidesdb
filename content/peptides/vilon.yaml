      rationale: >-
        Both are Khavinson bioregulators targeting aging pathways. Epitalon (Ala-Glu-Asp-Gly) acts
        on telomerase and pineal function; Vilon on immune differentiation and chromatin
        decondensation. Combined in Russian gerontological protocols for multi-system aging
        intervention. Lezhava et al. (2023) tested both on aged lymphocyte chromatin, showing
        distinct epigenetic effects. Complementary, not synergistic in strict pharmacological sense.
      protocol:
        Vilon: Empirical — no standard
        Epitalon: Empirical — often 10 mg cycles
        Frequency: Sequential or concurrent (literature ambiguous)
      primary_benefit: Multi-system aging modulation (immune + pineal/circadian)
      cite: []
    - partner_slug: thymalin
      partner_label: Thymalin
      synergy: weak
      rationale: >-
        Thymalin is the parent polypeptide complex from which Vilon was isolated. Both target immune
        differentiation, but Thymalin is a complex mixture (multiple peptides), whereas Vilon is a
        purified dipeptide. Morozov & Khavinson (1997) described Vilon as a synthetic successor
        designed to replicate Thymalin's immunomodulatory effects with greater specificity.
        Redundant in practice; no published combination studies.
      protocol:
        Vilon: No standard
        Thymalin: 10–100 mg IM (polypeptide complex)
      primary_benefit: Redundant — both target T-cell differentiation
