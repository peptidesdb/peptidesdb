# =========================================================
# AOD-9604 (HGH 176-191 fragment)
# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: aod-9604
name: AOD-9604
peptide_class: Lipolytic HGH C-terminal fragment
classification: HGH 176-191 · β3-AR Lipolytic
categories: [lipolytic, fat-loss, gh-fragment]
aliases: ["AOD9604", "HGH 176-191", "AOD"]
color: amber
evidence_level: phase-2
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidedb-core]

summary: >-
  Modified 16-amino-acid C-terminal fragment of human growth hormone (residues
  176-191) engineered to retain the lipolytic activity of native HGH while
  eliminating IGF-1 elevation, glucose-handling effects, and anti-insulin
  signaling. Acts via β3-adrenergic-mediated lipolysis. Multiple Phase 2 obesity
  trials completed; not FDA-approved as of 2026.

hero_stats:
  - value: "250–300 mcg"
    label: "Daily dose"
    cite: [heffernan-2001]
  - value: "Phase 2"
    label: "Evidence level"
    cite: [heffernan-2001, ng-2008]
  - value: "~30 min"
    label: "Half-life"
hero_route: "SQ · Abdomen · Daily fasted"

mechanism:
  primary_target:
    value: "β3-adrenergic receptor (proposed)"
    cite: [ng-2008]
  pathway:
    value: "β3-AR activation → cAMP → hormone-sensitive lipase activation → triglyceride breakdown to FFA + glycerol"
    cite: [ng-2008]
  downstream_effect:
    value: "Lipolysis of adipose tissue triglycerides; FFA release for oxidation; minimal IGF-1 / insulin impact"
    cite: [heffernan-2001]
  origin:
    value: "Synthetic modified C-terminal hexadecapeptide fragment of human GH (176-191) with N-terminal Tyr substitution"
    cite: [ng-2008]
  feedback_intact:
    value: "No GH-axis or IGF-1 feedback"
    badge: green
  diagram:
    - { kind: node, text: "Adipocyte" }
    - { kind: arrow, text: "↓ AOD-9604 binds β3-AR" }
    - { kind: node, text: "cAMP elevation" }
    - { kind: arrow, text: "↓ Hormone-sensitive lipase activation" }
    - { kind: node, text: "Triglyceride hydrolysis" }
    - { kind: arrow, text: "↓ FFA + glycerol release" }
    - { kind: outcome, text: "Lipolysis without IGF-1 elevation" }

