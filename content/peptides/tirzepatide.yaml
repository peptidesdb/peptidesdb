schema_version: 1
slug: tirzepatide
name: Tirzepatide
peptide_class: GIP / GLP-1 Dual Receptor Agonist
classification: GIP+GLP-1 Dual Agonist · FDA-Approved
categories: [glp-1, gip, lipolytic, fda-approved, weight-management]
