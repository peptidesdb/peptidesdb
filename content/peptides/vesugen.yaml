summary:
  value: >-
    Synthetic tripeptide (Lys-Glu-Asp) from the Khavinson bioregulatory peptide school. Designed for
    vascular endothelium targeting. Animal models demonstrate normalisation of endothelin-1
    expression in atherosclerotic and restenotic vessels, restoration of connexin-mediated cell
    interactions, and stimulation of Ki-67-associated proliferation in aged endothelial cells.
    Proposed mechanism: epigenetic modulation via promoter binding to MKI67 and endothelial marker
    genes. Clinical data limited to Russian-language case series in elderly populations with
    vascular insufficiency.
