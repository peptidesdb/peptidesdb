description_md: >-
  ## Overview


  AHK-Cu is a synthetic tripeptide-copper complex structurally analogous to the widely studied
  GHK-Cu, differentiated by an alanine substitution at the N-terminus. Like other copper peptides,
  AHK-Cu is investigated for its regenerative effects on dermal tissues, with primary applications
  in hair growth stimulation, wound healing, and angiogenesis.


  ## Research Context


  Pyo et al. (2007) demonstrated that AHK-Cu at picomolar to nanomolar concentrations (10⁻¹² – 10⁻⁹
  M) stimulates human hair follicle elongation ex vivo and promotes dermal papilla cell (DPC)
  proliferation in vitro. The peptide modulates key signaling pathways: elevating VEGF
  (pro-angiogenic), suppressing TGF-β1 (pro-fibrotic), and increasing the Bcl-2/Bax ratio to reduce
  apoptosis. Caspase-3 and PARP cleavage were also reduced, indicating anti-apoptotic effects in
  dermal papilla cells.


  ## Mechanism of Action


  AHK-Cu acts on dermal papilla cells — specialized fibroblasts critical to hair follicle
  morphogenesis. The copper-peptide complex is thought to be internalized via copper transport
  mechanisms, where it influences gene expression and cellular metabolism. Downstream effects
  include:


  - **VEGF elevation**: Promotes angiogenesis and nutrient delivery to hair follicles.

  - **TGF-β1 suppression**: Reduces fibrotic signaling, creating a pro-proliferative environment.

  - **Anti-apoptotic signaling**: Elevated Bcl-2/Bax ratio and reduced caspase-3 cleavage protect
  DPCs from programmed cell death.


  These mechanisms align with the known bioactivity of copper peptides as a class, though AHK-Cu's
  alanine substitution may confer distinct pharmacokinetic or receptor-binding properties relative
  to GHK-Cu.


  ## Clinical and Cosmetic Use


  No published human clinical trials exist for AHK-Cu. Its use is primarily cosmetic, with
  formulations appearing in hair serums and anti-aging topicals. Efficacy in human subjects is
  extrapolated from in vitro and ex vivo data, following the precedent set by GHK-Cu, which has a
  more robust clinical profile.


  Typical cosmetic concentrations range from 0.001–0.01%, applied topically once or twice daily.
  Protocols generally recommend 8–12 weeks of consistent use to assess hair growth or dermal
  regeneration outcomes.


  ## Safety Profile


  Topical copper peptides are generally well-tolerated. Adverse effects are rare and typically
  limited to mild local irritation (erythema, pruritus). Systemic copper toxicity is unlikely at
  cosmetic concentrations. Contraindications include known copper allergy, Wilson's disease, or
  application to broken skin where absorption may be enhanced.


  ## Evidence Limitations


  AHK-Cu's evidence base is limited to a single ex vivo/in vitro study (Pyo et al., 2007). No human
  clinical trials, pharmacokinetic data, or long-term safety studies have been published. Its use in
  cosmetic products is based on mechanistic plausibility and class extrapolation from GHK-Cu.


  ## Comparison to GHK-Cu


  GHK-Cu (glycine-histidine-lysine-Cu²⁺) is the more extensively studied copper peptide, with
  demonstrated effects on collagen synthesis, wound healing, and anti-aging. AHK-Cu's
  alanine-for-glycine substitution may alter binding affinity, bioavailability, or cellular uptake,
  but direct comparative studies are absent. In cosmetic formulations, the two are often used
  interchangeably or in combination.
