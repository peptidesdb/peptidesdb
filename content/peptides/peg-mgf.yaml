summary:
  value: >-
    PEGylated variant of mechano growth factor (MGF / IGF-1Ec), a splice variant of IGF-1
    upregulated by mechanical loading. Polyethylene glycol conjugation extends plasma half-life from
    ~7 minutes (native MGF) to approximately 2 hours. Research application targets satellite cell
    activation, muscle repair, and post-exercise recovery. Not FDA-approved; limited to preclinical
    and mechanistic studies.
  cite: []
