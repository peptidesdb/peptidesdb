administration:
  steps:
    - title: Wound Healing Protocol (Animal Model)
      body: >-
        Pyrogallol-functionalized hyaluronic acid (HA-PG) hydrogel patch loaded with PTD-DBM
        peptide, applied directly to wound bed. Adhesive hydrogel provides sustained release over
        multiple days.
      cite:
        - lee-2023
    - title: Hair Regeneration Protocol (Animal Model)
      body: >-
        Topical application to scalp or wound site. Precise formulation not disclosed; studies used
        Cxxc5 knockout or direct peptide application in wound-induced hair neogenesis models.
      cite:
        - ryu-2023
    - title: Combination Therapy
      body: >-
        PTD-DBM + valproic acid (GSK-3β inhibitor) in HA-PG patch showed synergistic effect on scar
        reduction and regenerative wound healing. VPA enhances Wnt pathway activation downstream.
      cite:
        - lee-2023
    - title: Storage & Handling
      body: >-
        Not disclosed in available literature. Peptide stability and storage conditions not
        published.
      cite: []
synergy:
  stacks:
    - partner_slug: valproic-acid
      partner_label: Valproic Acid
      synergy: strong
      rationale: >-
        Valproic acid (GSK-3β inhibitor) synergizes with PTD-DBM by blocking downstream Wnt pathway
        inhibition. PTD-DBM releases Dishevelled from CXXC5 suppression, while VPA prevents
        GSK-3β-mediated β-catenin degradation. Combined, they maximize Wnt/β-catenin activation for
        regenerative wound healing and scar reduction.
      protocol:
        PTD-DBM: Hydrogel patch delivery
        Valproic Acid: Co-loaded in same HA-PG patch
        Duration: Multi-day sustained release
      primary_benefit: Regenerative wound healing with minimal scar formation
      cite:
        - lee-2023
description_md: >-
  **PTD-DBM** is a rationally designed fusion peptide engineered to activate the Wnt/β-catenin
  pathway by disrupting the inhibitory interaction between CXXC5 and Dishevelled. The protein
  transduction domain enables cell penetration, while the Dishevelled-binding motif competitively
  displaces CXXC5 from its endogenous target.


  Animal studies demonstrate robust efficacy in two regenerative contexts:


  1. **Hair regeneration**: PTD-DBM reverses DHT-induced androgenetic alopecia mediated by PGD2
  signaling. In wound-induced hair neogenesis models, peptide treatment or Cxxc5 knockout restored
  hair growth suppressed by PGD2.


  2. **Wound healing**: Hydrogel patch delivery of PTD-DBM (with or without valproic acid) promoted
  scarless wound closure in mice by inhibiting myofibroblast differentiation and restoring
  regenerative microenvironment features observed in fetal skin.


  No human data exists. Wnt pathway dysregulation is implicated in tumorigenesis, warranting caution
  in translation.
