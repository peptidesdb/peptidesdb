administration:
  steps:
    - title: Reconstitution
      body: >-
        Add 1–2 mL sterile or bacteriostatic water to lyophilised vial. Swirl gently; do not shake.
        Solution should be clear.
      cite: []
    - title: Injection site
      body: Subcutaneous — abdomen or thigh. Rotate sites daily. Use standard insulin syringe (27–31G).
      cite: []
    - title: Timing
      body: >-
        Morning or evening; no established optimal timing. Anecdotal preference: evening to align
        with circadian testosterone patterns.
      cite: []
    - title: Storage
      body: >-
        Lyophilised: room temp, dark. Reconstituted: refrigerate 2–8 °C, use within 14–21 days if
        bacteriostatic water used.
      cite: []
    - title: Cycle protocol
      body: >-
        10–20 days on, 10–14 days off. Bioregulator tradition uses pulsed exposure; rationale:
        prevent receptor/pathway desensitisation.
      cite: []
description_md: >-
  ## Overview


  Testagen is a short tetrapeptide (Lys-Glu-Asp-Gly) originating from the Khavinson bioregulator
  school in Russia, proposed as a testicular-specific tissue regulator. The bioregulator framework
  posits that organ-derived peptide fragments modulate gene expression in their tissue of origin,
  supporting regeneration and homeostasis.


  ## Mechanistic Data


  Fedoreyeva et al. (2011) demonstrated that fluorescently labeled testagen penetrates HeLa cell
  nuclei and accumulates in the nucleolus. In vitro binding assays revealed sequence-dependent
  interaction with single- and double-stranded oligonucleotides and DNA-ethidium bromide complexes,
  with differential Stern-Volmer quenching constants. This nuclear localization and DNA-binding
  specificity align with the bioregulator hypothesis that short peptides influence transcriptional
  regulation.


  ## Evidence Limitations


  No peer-reviewed human clinical trials exist. Animal data on testicular function and
  spermatogenesis are referenced in Russian literature but lack Western replication. The mechanistic
  work (Fedoreyeva 2011) used HeLa cells, not testicular tissue, limiting tissue-specificity
  conclusions. Safety, efficacy, and hormonal impact in humans remain uncharacterized.


  ## Regulatory Status


  Not FDA-approved. Not recognized by EMA. Available as a research peptide or supplement in
  jurisdictions with permissive peptide regulation.


  ## Khavinson Bioregulator Context


  Khavinson peptides (epithalon, pinealon, testagen, etc.) share a common hypothesis: organ-specific
  short peptides extracted from animal tissues exert epigenetic or transcriptional effects on
  corresponding human tissues. Evidence for this class remains largely preclinical and mechanistic;
  clinical validation is sparse.
