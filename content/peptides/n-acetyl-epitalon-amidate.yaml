summary:
  value: >-
    Modified tetrapeptide (Ala-Glu-Asp-Gly) with N-acetyl and C-terminal amide caps for enhanced
    stability. Russian bioregulator developed by Khavinson et al. to activate telomerase in human
    somatic cells, induce telomere elongation, and overcome the Hayflick limit. In vitro studies
    show 10 additional passages in human fetal fibroblasts beyond natural senescence. Proposed
    mechanism: direct binding to promoter regions of telomerase, retinal genes, and RNA polymerase
    II to initiate transcription.
  cite: []
