# CJC-1295 (no DAC) — short-acting GHRH analogue
# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: cjc-1295
name: CJC-1295 (no DAC)
peptide_class: GHRH Analogue (modified GRF 1-29)
classification: Short-acting GHRH · No DAC variant
categories: [gh-axis, ghrh, short-acting]
aliases: ["CJC-1295 without DAC", "Mod GRF 1-29", "CJC-1295 no DAC"]
color: blue
evidence_level: phase-1
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  29-amino-acid GHRH analogue based on the active N-terminal fragment of human
  GHRH (GRF 1-29) with four amino-acid substitutions for stability against
  enzymatic degradation. Unlike CJC-1295 with DAC (Drug Affinity Complex),
  the no-DAC variant lacks the maleimide that binds serum albumin, giving it
  a short pulsatile half-life (~30 min) similar to native GHRH. Pairs naturally
  with selective GHRPs like ipamorelin for dual-axis GH stimulation.

