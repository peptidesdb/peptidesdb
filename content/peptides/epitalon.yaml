schema_version: 1
slug: epitalon
name: Epitalon
peptide_class: Tetrapeptide bioregulator
classification: Pineal bioregulator · Telomerase activator
categories: [longevity, anti-aging, telomere, sleep]
aliases: [Epithalon, "Epithalamin synthetic", "Ala-Glu-Asp-Gly"]
color: purple
evidence_level: human-mechanistic
fda_approved: false
