summary:
  value: >-
    TGF-β superfamily myokine that negatively regulates skeletal muscle growth. Genetic
    loss-of-function increases muscle mass, reduces adiposity, and improves metabolic health in mice
    and humans with no known adverse phenotypes. Primary research focus involves inhibition
    strategies (monoclonal antibodies, active immunotherapy, gene editing) rather than exogenous
    administration. Studied for sarcopenia, obesity, and muscle wasting conditions.
  cite:
    - herman-2026
    - jacquez-2026
    - iglesias-2026
