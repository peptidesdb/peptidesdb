contributors: [peptidedb-core]

summary: >-
  Endogenous copper-binding tripeptide (Gly-His-Lys) found in human plasma at
  ~200 ng/mL in young adults, declining sharply with age. Forms a 1:1 complex
  with Cu(II) to deliver copper to tissues, regulates collagen, elastin, and
  glycosaminoglycan synthesis, and triggers anti-inflammatory + regenerative
  gene programs. Widely used topically and via SQ injection for skin
  rejuvenation, wound healing, and hair regrowth.

