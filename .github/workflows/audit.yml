name: audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit peptide YAML + run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Generate citation registry
        run: bun run gen:citations

      - name: Audit peptide YAML against schema + citation registry
        run: bun run audit:trust

      - name: Unit tests
        run: bun test test/
