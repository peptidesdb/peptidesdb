summary:
  value: >-
    Synthetic 13-amino-acid α-melanocyte-stimulating hormone (α-MSH) analogue, FDA-approved (2019,
    Scenesse) for erythropoietic protoporphyria. Acts on MC1R to stimulate melanin synthesis in
    melanocytes, enabling photoprotection in patients with severe photosensitivity. Distinguished
    from endogenous α-MSH by norleucine at position 4 and D-phenylalanine at position 7, conferring
    enhanced metabolic stability. Administered as subcutaneous implant.
  cite:
    - chawathe-2026
    - habbema-2017
