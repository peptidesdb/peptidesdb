summary: >-
  Non-peptide, orally bioavailable ghrelin receptor agonist. Distinct from
  injectable GHRPs because it is a small molecule (not technically a peptide,
  but listed for class completeness) with a long ~24 hour half-life. The
  Nass et al. 2008 trial showed sustained GH/IGF-1 elevation and lean mass
  preservation in elderly adults over 2 years — but with a measurable
  glucose-tolerance signal (HbA1c +0.3-0.5%).

