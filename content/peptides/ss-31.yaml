synergy:
  stacks:
    - partner_slug: mots-c
      partner_label: MOTS-c
      synergy: moderate
      rationale: >-
        SS-31 and MOTS-c address mitochondrial decline through complementary
        axes. SS-31 protects existing mitochondrial structure (cardiolipin
        binding, cristae stabilisation). MOTS-c upregulates AMPK/PGC-1α,
        triggering biogenesis of new mitochondria. Together they pair
        preservation with renewal — anecdotally favoured in healthspan and
        post-cardio-event recovery protocols.
      protocol:
        SS-31: "5–10 mg SQ · daily morning"
        MOTS-c: "5 mg SQ · 2× per week pre-workout"
      primary_benefit: "Mitochondrial preservation + biogenesis"
