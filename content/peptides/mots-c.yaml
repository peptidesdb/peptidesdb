administration:
  steps:
    - title: Reconstitution
      body: "Add 1–2 mL bacteriostatic water. At 10 mg/vial, 1 mL gives 10 mg/mL concentration. Roll gently to dissolve."
    - title: Injection site
      body: "Subcutaneous — abdomen, thigh, or deltoid. Rotate sites to avoid lipohypertrophy. Pinch fat layer."
    - title: Timing
      body: "Pre-workout or fasted state preferred — metabolic context amplifies AMPK response. 2–3× per week."
    - title: Storage
      body: "Lyophilised: room temp, protected from light. Reconstituted: refrigerate, use within 21–30 days. Short systemic stability."
    - title: Needle
      body: "27–31G insulin syringe. Short needle (4–6 mm) for SQ delivery. Clean technique mandatory."

synergy:
  stacks:
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: moderate
      rationale: >-
        MOTS-c activates AMPK/PGC-1α for mitochondrial efficiency and fatty acid
        oxidation; ipamorelin stimulates GH for anabolic recovery and sleep depth.
        Pathways are complementary — MOTS-c handles metabolic flexibility and
        glucose handling while ipamorelin drives recovery and body recomposition
        through GH. Theoretical synergy is high; clinical data is lacking.
      protocol:
        MOTS-c: "5 mg SQ · pre-workout (2–3×/wk)"
        Ipamorelin: "200–300 mcg SQ · pre-sleep (daily)"
      primary_benefit: "Metabolic flexibility + GH recovery + ROS reduction"
