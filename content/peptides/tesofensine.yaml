# =========================================================
# Tesofensine — triple monoamine reuptake inhibitor
# =========================================================
schema_version: 1
slug: tesofensine
name: Tesofensine
peptide_class: Triple monoamine reuptake inhibitor (small molecule)
classification: SNDRI · Phase 3 obesity candidate
categories: [weight-management, monoamine, small-molecule]
aliases: [NS2330]
color: rose
evidence_level: phase-3
fda_approved: false
last_reviewed: "2026-04-25"
maturity: draft
contributors: [peptidesdb-core]

summary: >-
  Originally developed for Alzheimer's and Parkinson's, tesofensine is a
  small-molecule (not technically a peptide) triple reuptake inhibitor of
  serotonin, norepinephrine, and dopamine. Phase 2b in obesity (Astrup
  Lancet 2008) demonstrated 9.2 kg weight loss at 0.5 mg/day over 24
  weeks — among the largest non-GLP-1 weight-loss effects. Phase 3 trial
  in Mexico (Medix) ongoing. Listed for class completeness; not a peptide.

hero_stats:
  - value: "0.25–0.5 mg"
    label: "Daily dose"
    cite: [astrup-2008-tesofensine]
  - value: "9.2 kg"
    label: "Weight ↓ (24 wk)"
    cite: [astrup-2008-tesofensine]
  - value: "Phase 3"
    label: "Evidence level"
    cite: [astrup-2008-tesofensine]
