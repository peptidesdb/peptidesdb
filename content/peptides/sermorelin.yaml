# =========================================================
# Sermorelin (GHRH 1-29) — short-acting GHRH analogue
# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: sermorelin
name: Sermorelin
peptide_class: GHRH Analogue (1-29)
classification: GHRH 1-29 fragment · Short-acting
categories: [gh-axis, ghrh, short-acting]
aliases: [GHRH 1-29, GRF 1-29, "sermorelin acetate"]
color: blue
evidence_level: phase-3
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  29-amino-acid synthetic analogue of the bioactive N-terminal fragment of
  human GHRH. Was FDA-approved (1990s) under the brand Geref for diagnosis of
  GH deficiency in children but withdrawn from the market for commercial
  reasons (not safety). Acts at the same GHRH receptor as native GHRH and
  tesamorelin but with shorter half-life (~12 min) and unmodified backbone,
  making it the simplest GHRH analogue.

