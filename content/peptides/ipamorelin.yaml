administration:
  steps:
    - title: Reconstitution
      body: "Add 2 mL bacteriostatic water to 5 mg vial → 2.5 mg/mL. Roll gently. Solution should be clear."
    - title: Injection site
      body: "Subcutaneous, abdomen or thigh. Rotate sites. Pinch fat for shallow SQ delivery."
    - title: Timing
      body: "Pre-sleep optimal — aligns with natural GH pulse. Some protocols add a morning fasted dose."
    - title: Storage
      body: "Lyophilised: room temp, protected from light. Reconstituted: refrigerate 2–8 °C, use within 30 days."
    - title: Needle
      body: "29–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: tesamorelin
      partner_label: Tesamorelin
      synergy: strong
      rationale: >-
        Ipamorelin (GHRP) + tesamorelin (GHRH analogue) is the textbook
        dual-axis GH stack. They activate two distinct pituitary receptors —
        the ghrelin receptor and the GHRH receptor — producing a synergistic
        GH pulse larger than either alone. Ipamorelin's selectivity (no
        cortisol/prolactin spike) makes it the ideal GHRP partner for
        long-term protocols.
      protocol:
        Ipamorelin: "200–300 mcg SQ · pre-sleep"
        Tesamorelin: "2 mg SQ · same injection · pre-sleep"
      primary_benefit: "Maximal GH pulsatility, fat loss, recovery, sleep depth"
      cite: [raun-1998, bowers-2002]
    - partner_slug: cjc-1295
      partner_label: CJC-1295 (no DAC)
      synergy: strong
      rationale: >-
        CJC-1295 (no DAC) is a short-acting GHRH analogue. Combined with
        ipamorelin (GHRP), the pulse is amplified across both receptor systems
        with timing similar to native physiology. Without the DAC modification,
        the stack maintains sharp peaks rather than the sustained elevation
        seen with CJC-1295-DAC + ipamorelin.
      protocol:
        Ipamorelin: "200–300 mcg SQ · pre-sleep"
        "CJC-1295 (no DAC)": "100 mcg SQ · same injection"
      primary_benefit: "Pulsatile GH stimulation matching physiological pattern"
      cite: [teichman-2006, ionescu-2006]
