administration:
  steps:
    - title: Reconstitution
      body: "Add 2 mL bacteriostatic water to 5 mg vial → 2.5 mg/mL."
    - title: Injection site
      body: "SQ — abdomen or thigh. Rotate sites."
    - title: Timing
      body: "Pre-sleep + fasted preferred."
    - title: Storage
      body: "Lyophilised: room temp, light-protected. Reconstituted: refrigerate ≤30 days."
    - title: Needle
      body: "29–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: cjc-1295
      partner_label: CJC-1295 (no DAC)
      synergy: strong
      rationale: >-
        GHRP-2 + CJC-1295-no-DAC is a higher-amplitude alternative to the
        ipamorelin + CJC-1295 stack. GHRP-2 produces a stronger pulse but
        with cortisol + prolactin signal — choose when maximum GH amplitude
        is the goal and the side-effect tolerance is acceptable.
      protocol:
        "GHRP-2": "100–200 mcg SQ · pre-sleep"
        "CJC-1295 (no DAC)": "100 mcg SQ · same injection"
      primary_benefit: "High-amplitude GH pulse, body composition"
      cite: [bowers-1990-ghrp2, teichman-2006]
