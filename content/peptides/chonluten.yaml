summary:
  value: >-
    Khavinson-school bioregulatory peptide complex targeting bronchial mucosa and respiratory
    epithelium. Preclinical data demonstrate modulation of proliferative activity and inflammatory
    pathways in monocyte/macrophage cell lines. Part of the Russian bioregulator tradition with
    tissue-specific organ peptide architecture. Limited Western research indexing; mechanistic
    evidence from in vitro models.
