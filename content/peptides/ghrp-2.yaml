# =========================================================
# GHRP-2 (Pralmorelin / KP-102)
# =========================================================
schema_version: 1
slug: ghrp-2
name: GHRP-2
peptide_class: GHRP / Ghrelin Receptor Agonist
classification: Hexapeptide GHRP · Phase 2 (clinical diagnostic)
categories: [gh-axis, ghrp, ghrelin]
aliases: [Pralmorelin, KP-102, GHRP2]
color: purple
evidence_level: phase-2
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidedb-core]

summary: >-
  Synthetic hexapeptide GHRP — D-Ala-D-2-Nal-Ala-Trp-D-Phe-Lys-NH₂. Stronger
  GH-stimulating action than Ipamorelin but with measurable cortisol and
  prolactin elevation at higher doses. Approved in Japan as a diagnostic
  agent (Pralmorelin) for adult GH deficiency. Anecdotally used for body
  composition and recovery.

hero_stats:
  - value: "100–300 mcg"
    label: "Per dose"
    cite: [bowers-1990-ghrp2]
  - value: "Phase 2"
    label: "Evidence level"
    cite: [bowers-1990-ghrp2, sigalos-2018]
  - value: "~30 min"
    label: "Half-life"
    cite: [malagon-1999]
hero_route: "SQ · Multiple sites · 1–3×/day"

mechanism:
  primary_target:
    value: "Ghrelin receptor (GHS-R1a) on anterior pituitary"
    cite: [bowers-1990-ghrp2]
  pathway:
    value: "GHS-R1a → Gαq → Ca²⁺ → GH vesicle exocytosis"
    cite: [bowers-2002]
  downstream_effect:
    value: "Strong GH pulse + IGF-1 elevation; appetite increase via ghrelin agonism"
    cite: [bowers-2002]
  feedback_intact:
    value: "Yes, with somatostatin feedback active"
    badge: green
  origin:
    value: "Synthetic hexapeptide; developed by Bowers/Tulane group in the 1980s"
    cite: [bowers-1990-ghrp2]
  diagram:
    - { kind: node, text: "Anterior Pituitary GHS-R1a" }
    - { kind: arrow, text: "↓ GHRP-2 binding" }
    - { kind: node, text: "GH pulse" }
    - { kind: arrow, text: "↓ Liver IGF-1 synthesis" }
    - { kind: outcome, text: "GH/IGF-1 + Recovery" }

