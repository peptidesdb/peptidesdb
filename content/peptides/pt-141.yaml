side_effects:
  rows:
    - parameter: "Nausea"
      value:
        value: "Common (~40%); often transient"
        badge: yellow
        cite: [fda-vyleesi-label-2019]
      severity: moderate
    - parameter: "Flushing"
      value: "Common, transient"
      severity: mild
    - parameter: "Injection site reaction"
      value: "Erythema, mild pain"
      severity: mild
    - parameter: "Headache"
      value: "Common"
      severity: mild
    - parameter: "Hyperpigmentation (focal)"
      value:
        value: "Rare focal skin darkening; reversible after discontinuation"
        badge: yellow
        cite: [fda-vyleesi-label-2019]
      severity: moderate
    - parameter: "Hypertension (transient)"
      value:
        value: "Mean ↑6 mmHg systolic peaking ~4 h post-dose; resolves within 12 h"
        badge: yellow
        cite: [fda-vyleesi-label-2019]
      severity: moderate
    - parameter: "Pregnancy / OB"
      value:
        value: "Contraindicated"
        badge: red
      severity: severe
    - parameter: "Cardiovascular disease"
      value:
        value: "Use caution; transient BP rise"
        badge: yellow
      severity: moderate
  contraindications_absolute:
    - "Uncontrolled hypertension"
    - "Known cardiovascular disease (caution)"
    - "Pregnancy"
  contraindications_relative:
    - "Pre-existing hyperpigmentation disorders"
    - "MC4R-pathway-dependent psychiatric conditions"

administration:
  steps:
    - title: Reconstitution
      body: "Vyleesi: pre-filled auto-injector. Research vial: 2 mL bacteriostatic water per 10 mg → 5 mg/mL."
    - title: Injection site
      body: "SQ — abdomen or thigh."
    - title: Timing
      body: "≥45 min before sexual activity for peak effect. Effect persists ~6–8 h."
    - title: Storage
      body: "Vyleesi: room temp ≤30 °C. Research vial: refrigerate after reconstitution."
    - title: Needle
      body: "Auto-injector (Vyleesi) or 29–31G, 4–8 mm insulin syringe."

