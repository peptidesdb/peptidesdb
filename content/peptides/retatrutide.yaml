# Reviewed: 2026-04-25
# =========================================================
schema_version: 1
slug: retatrutide
name: Retatrutide
peptide_class: GLP-1 / GIP / Glucagon Triple Agonist
classification: Triple-receptor agonist · Phase 3
categories: [glp-1, gip, glucagon, lipolytic, weight-management]
aliases: [LY3437943]
color: rose
evidence_level: phase-2
fda_approved: false
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Investigational triple-receptor agonist of GLP-1, GIP, and glucagon receptors
  developed by Eli Lilly. The Phase 2 trial (Jastreboff et al., NEJM 2023)
  demonstrated 24.2% body-weight reduction at 12 mg over 48 weeks — the
  largest weight-loss effect of any peptide tested in obesity. Phase 3 trials
  ongoing as of 2026.

hero_stats:
  - value: "1–12 mg"
    label: "Weekly dose"
    cite: [jastreboff-2023-reta]
  - value: "24.2%"
    label: "Body-weight ↓"
    cite: [jastreboff-2023-reta]
  - value: "~6 days"
    label: "Half-life (est)"
hero_route: "SQ · Abdomen · Once weekly"

mechanism:
  primary_target:
    value: "GLP-1R + GIPR + Glucagon receptor (triple agonism)"
    cite: [jastreboff-2023-reta]
  pathway:
    value: "Triple-receptor activation → ↑insulin (GLP-1+GIP), ↓gastric emptying, ↑lipid handling, ↑energy expenditure (glucagon component)"
    cite: [jastreboff-2023-reta]
  downstream_effect:
    value: "Maximal weight loss across class. Glucagon component drives lipolysis and energy expenditure beyond GLP-1+GIP alone"
    cite: [jastreboff-2023-reta]
  origin:
    value: "Synthetic peptide engineered for balanced affinity at three incretin / glucagon receptors"
    cite: [jastreboff-2023-reta]
  diagram:
    - { kind: node, text: "Pancreatic β-cells + α-cells" }
    - { kind: arrow, text: "↓ ↑insulin, ↓glucagon (paradox: agonist at glucagon-R but β-cell reverses net glucose)" }
    - { kind: node, text: "Adipose + Liver" }
    - { kind: arrow, text: "↓ ↑ lipid oxidation, ↑ thermogenesis" }
    - { kind: node, text: "Hypothalamus" }
    - { kind: arrow, text: "↓ ↓ appetite, ↑ energy expenditure" }
    - { kind: outcome, text: "24% Body-Weight Reduction" }

