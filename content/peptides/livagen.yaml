description_md: >-
  ## Overview


  Livagen (Lys-Glu-Asp-Ala, also designated KEDA) is a synthetic tetrapeptide developed within the
  Khavinson bioregulator framework, a Russian tradition of organ-specific peptide therapy. Derived
  through amino acid analysis of liver polypeptide complexes (Ventvil), it exhibits tissue-specific
  effects on hepatocytes: stimulating protein synthesis in aged cells, normalizing digestive enzyme
  activity in age-stratified rat models, and demonstrating hepatoprotection in fibrosis and
  hepatitis.


  ## Research Context


  All published data derive from animal models (primarily rats aged 1–24 months) and in vitro
  organotypic culture. No human clinical trials appear in the indexed literature. The peptide
  resists intestinal peptidase hydrolysis, enabling oral bioavailability—a distinguishing feature
  among bioregulatory peptides. Tissue specificity is well-documented: Livagen selectively
  stimulates liver explant growth while producing no effect on brain cortex, thymus, or other
  tissues in parallel culture experiments.


  ## Mechanism Nuance


  Livagen's action follows the bioregulator hypothesis: short peptides derived from tissue extracts
  regulate gene expression in their tissue of origin. In senescent hepatocytes (24-month rats),
  Livagen elevated protein synthesis levels and restored circadian amplitude of synthetic activity.
  In young animals, enzyme activity decreased; in old animals, it increased toward youthful
  baselines—suggesting homeostatic rather than unidirectional modulation. The peptide also inhibits
  glycyl-L-leucine dipeptidase by 50% in vitro, though the physiological significance remains
  unclear.


  ## Evidence Gaps


  No human pharmacokinetics, safety, or efficacy data exist in peer-reviewed literature. The
  peptide's precise molecular targets, receptor binding (if any), and signaling cascades remain
  undefined. All hepatoprotective claims rest on Russian-language abstracts describing fibrosis and
  hepatitis models; primary experimental designs, controls, and statistical rigor are not accessible
  in the provided summaries. Translation from rat hepatocyte culture to human liver pathology is
  speculative.


  ## Classification Notes


  Livagen belongs to the Khavinson bioregulator class—peptides synthesized from organ-derived amino
  acid profiles, proposed to restore age-related tissue dysfunction. These compounds occupy a niche
  between classical pharmacology and nutraceuticals, with limited adoption outside the former Soviet
  research network. Evidence quality: mechanistic animal studies, no controlled human trials.
