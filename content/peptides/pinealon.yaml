# =========================================================
# Pinealon — Russian pineal-derived neuroprotective tetrapeptide
# =========================================================
schema_version: 1
slug: pinealon
name: Pinealon
peptide_class: Tetrapeptide bioregulator
classification: Pineal-derived · Neuroprotective
categories: [longevity, anti-aging, neuroprotective, peptide-bioregulator]
aliases: ["Glu-Asp-Arg", "EDR"]
color: purple
evidence_level: human-mechanistic
fda_approved: false
last_reviewed: "2026-04-25"
maturity: draft
contributors: [peptidedb-core]

summary: >-
  Synthetic tetrapeptide (Glu-Asp-Arg) developed at the Saint Petersburg
  Institute of Bioregulation and Gerontology. Russian literature reports
  neuroprotective and antioxidant effects, particularly in age-related
  cognitive decline. Limited Western RCT data. Frequently used anecdotally
  for cognitive support and longevity, often in combination with Epitalon.

hero_stats:
  - value: "5–10 mg"
    label: "Per cycle dose"
    cite: [khavinson-2014-pinealon]
  - value: "Human"
    label: "Mechanistic"
    cite: [khavinson-2014-pinealon]
  - value: "Hours"
    label: "Half-life (est)"
hero_route: "SQ or IM · Daily for 10 days · 1-2×/year"

mechanism:
  primary_target:
    value: "Antioxidant defense + neuronal gene expression (proposed)"
    cite: [khavinson-2014-pinealon]
  pathway:
    value: "Modulation of antioxidant enzymes (SOD, catalase) + neurotrophic factor expression"
    cite: [khavinson-2014-pinealon]
  downstream_effect:
    value: "Reduced oxidative stress in neurons; improved cognitive function in age-related decline"
    cite: [khavinson-2014-pinealon]
  origin:
    value: "Synthetic 4-AA peptide derived from pineal gland extract"
    cite: [khavinson-2014-pinealon]
  diagram:
    - { kind: node, text: "Neurons" }
    - { kind: arrow, text: "↓ Pinealon enters via short-peptide transport" }
    - { kind: node, text: "Antioxidant + neurotrophic gene expression" }
    - { kind: arrow, text: "↓ ↓ ROS, ↑ neuroprotection" }
    - { kind: outcome, text: "Cognitive Preservation" }

