description_md: >-
  ## Research Context


  Vilon is a dipeptide (Lys-Glu) developed by the Khavinson group at the St. Petersburg Institute of
  Bioregulation and Gerontology. It is the smallest peptide in the Khavinson bioregulator family,
  isolated from thymic extracts (Thymalin) and subsequently synthesised. The Khavinson school
  proposes that short peptides regulate gene expression and cellular differentiation via
  tissue-specific epigenetic mechanisms.


  ## Animal Evidence


  ### Immune Differentiation

  Linkova et al. (2011) cultured murine pineal gland lymphoid tissue with Vilon (concentration not
  specified). CD5⁺ precursors differentiated into:

  - T-helper cells (CD4⁺)

  - Cytotoxic T lymphocytes (CD8⁺)

  - B cells (CD19⁺)


  Vilon outperformed tetrapeptide Epithalon in inducing T-helper differentiation. The authors
  propose Vilon compensates for age-related thymic atrophy by activating extrathymic lymphopoiesis.


  ### Thymocyte Proliferation & Signal Transduction

  Khavinson et al. (2002) measured thymocyte blast transformation in mice. Vilon produced the
  strongest comitogenic effect among tested peptides (Vilon, Epithalon, Cortagen). It modulated
  IL-1β-induced proliferation and elevated sphingomyelinase activity in thymocyte membranes,
  implicating the sphingomyelin signalling pathway.


  ### Epigenetic Modulation

  Khavinson et al. (2014) proposed that Vilon suppresses expression of aging-associated genes:

  - **CCL11 (eotaxin)**: chemokine elevated in aging, linked to cognitive decline

  - **HMGB1 (alarmin1)**: inflammatory mediator in cardiovascular and neurological aging


  Lezhava et al. (2023) applied Vilon to lymphocytes from individuals aged 75–88 years. Differential
  scanning calorimetry and NOR activity assays suggested chromatin decondensation (reversal of
  heterochromatinisation), implying gene reactivation. Mechanistic details remain speculative.


  ## Clinical Translation: Absent


  No Phase 1–3 trials exist in PubMed. Russian gerontological practice uses Vilon, but dosing,
  safety, and efficacy data are not published in English-language peer-reviewed journals. Xu et al.
  (2024) describes a PEG-Glu-Lys-Glu drug delivery system, but this is a polymer scaffold—not the
  bioregulator peptide.


  ## Comparative Context


  Morozov & Khavinson (1997) compared natural thymic peptides (Thymalin) with synthetic dipeptides
  (Thymogen: Glu-Trp; Vilon: Lys-Glu). Both synthetic peptides activated T-cell differentiation and
  neutrophil chemotaxis. However, only natural Thymalin modulated antioxidant responses in
  thymocytes, suggesting mechanistic divergence.


  ## Limitations


  1. **No human pharmacokinetics**: Half-life, bioavailability, and ROA efficacy unknown.

  2. **Dosing protocols undefined**: Animal models use in vitro concentrations (μg/mL); human mg/kg
  extrapolation absent.

  3. **Mechanism hypothetical**: Epigenetic claims (CCL11/HMGB1 suppression) lack direct evidence
  (no ChIP-seq, RNA-seq, or methylation data).

  4. **Publication bias**: Khavinson-affiliated authors dominate literature; independent replication
  absent.


  ## Theoretical Risk


  Enhanced T-cell differentiation could exacerbate autoimmune conditions. No clinical reports exist,
  but theoretical contraindication applies to Crohn's disease, lupus, rheumatoid arthritis, or MS.


  ---


  **Evidence tier**: Animal mechanistic. Human applicability speculative. Western regulatory
  approval absent.
