summary:
  value: >-
    Des(1-3)IGF-1 is a truncated variant of insulin-like growth factor-1 lacking the N-terminal
    tripeptide (Gly-Pro-Glu). Reduced binding affinity for IGF-binding proteins yields ~10-fold
    greater potency than native IGF-1 in vitro and enhanced bioavailability at target tissues.
    Primarily investigated in research contexts for skeletal muscle hypertrophy, myoblast
    differentiation, and cell proliferation. No human clinical approval; applications remain
    experimental.
  cite:
    - bredehft-2008
    - crescioli-2002
