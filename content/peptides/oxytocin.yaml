summary:
  value: >-
    Nine-amino-acid posterior pituitary neuropeptide, FDA-approved for labor induction and lactation
    augmentation. Modulates oxytocin receptors (OXTR) in hypothalamus, amygdala, and hippocampus,
    influencing GABAergic, dopaminergic, and serotonergic neurotransmission. Investigated for social
    cognition deficits in autism spectrum disorder, social anxiety, and schizophrenia. Clinical
    effects include enhanced social bonding, trust, and gaze behavior; neuromodulatory actions span
    synaptic plasticity, neurogenesis, and anti-inflammatory pathways.
  cite:
    - paul-2026
    - prinsen-2026
    - chaulagain-2025
