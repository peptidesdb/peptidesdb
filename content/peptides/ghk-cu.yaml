  downstream_effect:
    value: "Skin firmness + texture improvement, accelerated wound healing, hair regrowth, anti-inflammatory action"
    cite: [pickart-2018, zink-2003]
  origin:
    value: "Endogenous tripeptide first isolated from human plasma; declines from ~200 ng/mL at age 20 to ~80 ng/mL at age 60"
    cite: [pickart-2018]
  feedback_intact:
    value: "Replaces declining endogenous levels"
