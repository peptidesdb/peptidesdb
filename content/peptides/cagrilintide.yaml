synergy:
  stacks:
    - partner_slug: semaglutide
      partner_label: Semaglutide
      synergy: strong
      rationale: >-
        Cagrilintide (amylin receptor agonist) and semaglutide (GLP-1 receptor agonist) act on
        distinct receptor systems to produce synergistic weight loss through complementary
        mechanisms — central satiety via amylin pathways plus incretin-mediated glucose control and
        appetite suppression via GLP-1. Co-formulated as CagriSema, this combination demonstrates
        7.5% greater weight loss versus semaglutide monotherapy in Phase 3 trials with additional
        benefits on glycemic control and lipid parameters.
      protocol:
