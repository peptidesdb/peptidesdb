summary: >-
  Selective small-molecule inhibitor of nicotinamide N-methyltransferase
  (NNMT), an enzyme overexpressed in obesity that consumes SAM and NAD+.
  Inhibition restores cellular methylation and energy balance. Animal
  studies (Neelakantan 2018) showed reversal of high-fat-diet-induced
  obesity in mice. Listed for class completeness; not a peptide.

