summary:
  value: >-
    Dipeptide (Lys-Glu) from the Khavinson bioregulator school. Smallest Khavinson peptide. Animal
    models demonstrate immune cell differentiation induction, thymocyte proliferation enhancement,
    and potential lifespan extension. Proposed mechanism: epigenetic modulation via gene expression
    suppression (CCL11, HMGB1) in aging chromatin. Clinical evidence absent; Russian gerontological
    literature dominant.
