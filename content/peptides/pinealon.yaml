administration:
  steps:
    - title: Reconstitution
      body: "Add 1–2 mL bacteriostatic water to 10 mg vial."
    - title: Injection site
      body: "SQ — abdomen preferred."
    - title: Timing
      body: "Daily during cycle, any time."
    - title: Storage
      body: "Lyophilised: room temp. Reconstituted: refrigerate ≤30 days."
    - title: Needle
      body: "29–31G, 4–8 mm insulin syringe."

synergy:
  stacks:
    - partner_slug: epitalon
      partner_label: Epitalon
      synergy: moderate
      rationale: >-
        Pinealon (neuroprotection) + Epitalon (telomerase activation) form
        the canonical Khavinson "longevity stack" — both pineal-derived
        bioregulators with complementary axes. Pinealon supports neuronal
        antioxidant defense; Epitalon supports telomere maintenance.
        Anecdotally cycled together 1–2× per year.
      protocol:
        Pinealon: "5–10 mg SQ · daily × 10 days"
        Epitalon: "5–10 mg SQ · daily × 10 days (overlap or alternate)"
      primary_benefit: "Neuroprotection + telomere preservation"
      cite: [khavinson-2014-pinealon, khavinson-2003]
