schema_version: 1
slug: pt-141
name: PT-141
peptide_class: Melanocortin-4 Receptor Agonist
classification: MC4R Agonist · FDA-Approved (HSDD)
categories: [sexual-function, mc4r, fda-approved, melanocortin]
aliases: [Bremelanotide, Vyleesi, "PT 141"]
color: rose
evidence_level: fda-approved
fda_approved: true
approval_year: 2019
last_reviewed: "2026-04-25"
maturity: reviewed
contributors: [peptidesdb-core]

summary: >-
  Cyclic 7-amino-acid peptide and MC4R-selective agonist derived from
  α-MSH. FDA-approved 2019 (Vyleesi) for hypoactive sexual desire disorder
  in pre-menopausal women — the first centrally-acting peptide for sexual
  dysfunction. Acts on hypothalamic melanocortin pathways to drive arousal
  independent of vascular pathways (unlike PDE5 inhibitors).

